<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sesko — Sistema de Gestión</title>
  <meta name="theme-color" content="#1e2235">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sesko">
  <link rel="manifest" href="manifest.json">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    /* ========================================
   VARIABLES Y RESET
   Variables CSS globales, modo oscuro y reset base
   ======================================== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #f8fafc;
      --white: #ffffff;
      --sidebar: #1e2235;
      --sidebar2: #252b42;
      --primary: #4f46e5;
      --primary2: #4338ca;
      --primary-light: #eef2ff;
      --blue: #2563eb;
      --blue2: #3b82f6;
      --blue-light: #eff6ff;
      --green: #059669;
      --green-light: #ecfdf5;
      --red: #dc2626;
      --red-light: #fef2f2;
      --yellow: #d97706;
      --yellow-light: #fffbeb;
      --purple: #7c3aed;
      --purple-light: #f5f3ff;
      --text: #0f172a;
      --text2: #475569;
      --text3: #94a3b8;
      --text4: #cbd5e1;
      --border: #e2e8f0;
      --border2: #f1f5f9;
      --radius: 10px;
      --radius-lg: 14px;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      transition: background .3s, color .3s
    }

    body.dark {
      --bg: #0f1117;
      --white: #1a1d27;
      --border: #2a2d3a;
      --border2: #1f2230;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --primary-light: #2d2a5e;
      --green-light: #064e3b;
      --red-light: #450a0a;
      --yellow-light: #451a03;
      --purple-light: #2d1b69;
      --blue-light: #1e3a5f;
      --shadow: 0 1px 3px rgba(0, 0, 0, .3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, .4);
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px
    }

    /* ========================================
   LAYOUT Y SIDEBAR
   Estructura principal, topbar y navegación lateral
   ======================================== */
    /* ===== LAYOUT ===== */
    #app {
      min-height: 100vh
    }

    .layout {
      display: flex;
      min-height: 100vh
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 220px;
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform .3s ease;
      will-change: transform
    }

    .sb-logo {
      padding: 20px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06)
    }

    .sb-logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: var(--blue2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .sb-logo-mark svg {
      width: 20px;
      height: 20px
    }

    .sb-logo-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.3px
    }

    .sb-logo-sub {
      font-size: 10px;
      color: rgba(255, 255, 255, .35);
      margin-top: 1px
    }

    .sb-nav {
      flex: 1;
      padding: 8px 10px;
      overflow-y: auto;
      min-height: 0;
      scrollbar-width: thin
    }

    .sb-group {
      margin-bottom: 2px
    }

    .sb-group-header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
      user-select: none
    }

    .sb-group-header:hover {
      background: rgba(255, 255, 255, .05)
    }

    .sb-group-header.open {
      background: rgba(59, 130, 246, .15)
    }

    .sb-group-icon {
      width: 18px;
      height: 18px;
      font-size: 15px;
      text-align: center;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .sb-group-label {
      font-size: 12.5px;
      font-weight: 500;
      color: rgba(255, 255, 255, .7);
      flex: 1
    }

    .sb-group-arrow {
      font-size: 9px;
      color: rgba(255, 255, 255, .25);
      transition: transform .2s
    }

    .sb-group-header.open .sb-group-arrow {
      transform: rotate(90deg)
    }

    .sb-children {
      overflow: hidden;
      max-height: 0;
      transition: max-height .25s ease
    }

    .sb-children.open {
      max-height: 300px
    }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px 6px 36px;
      font-size: 12px;
      color: rgba(255, 255, 255, .45);
      border-radius: 7px;
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 1px
    }

    .sb-item:hover {
      color: rgba(255, 255, 255, .8);
      background: rgba(255, 255, 255, .05)
    }

    .sb-item.active {
      color: #93c5fd;
      background: rgba(59, 130, 246, .15);
      font-weight: 500;
      border-left: 2px solid rgba(147, 197, 253, .6);
      padding-left: 8px
    }

    .sb-single {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
      margin-bottom: 2px
    }

    .sb-single:hover {
      background: rgba(255, 255, 255, .05)
    }

    .sb-single.active {
      background: rgba(59, 130, 246, .2);
      border-left: 2px solid rgba(147, 197, 253, .6);
      padding-left: 8px
    }

    .sb-single-icon {
      width: 18px;
      height: 18px;
      font-size: 15px;
      text-align: center;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .sb-single-label {
      font-size: 12.5px;
      font-weight: 500;
      color: rgba(255, 255, 255, .7)
    }

    .sb-single.active .sb-single-label {
      color: #93c5fd
    }

    .sb-bottom {
      padding: 10px 14px;
      border-top: 1px solid rgba(255, 255, 255, .06);
      margin-top: auto
    }

    .sb-user {
      display: flex;
      align-items: center;
      gap: 9px
    }

    .sb-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(59, 130, 246, .3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #93c5fd;
      flex-shrink: 0
    }

    .sb-user-email {
      font-size: 11px;
      color: rgba(255, 255, 255, .4);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .sb-logout {
      margin-left: auto;
      font-size: 11px;
      color: rgba(255, 255, 255, .25);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 5px;
      transition: all .15s
    }

    .sb-logout:hover {
      color: #f87171;
      background: rgba(239, 68, 68, .1)
    }

    /* ===== MAIN ===== */
    .main {
      margin-left: 220px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh
    }

    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50
    }

    .topbar-left h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text)
    }

    .topbar-left p {
      font-size: 12px;
      color: var(--text3);
      margin-top: 1px
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .content {
      padding: 20px 24px;
      flex: 1
    }

    /* ========================================
   COMPONENTES UI
   Botones, cards, KPIs, tabla, badges, modales, formularios y utilidades
   ======================================== */
    /* ===== BOTONES ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all .15s;
      font-family: 'Inter', sans-serif
    }

    .btn-primary {
      background: var(--blue);
      color: #fff
    }

    .btn-primary:hover {
      background: #1d4ed8
    }

    .btn-secondary {
      background: var(--white);
      color: var(--text2);
      border: 1px solid var(--border)
    }

    .btn-secondary:hover {
      background: var(--bg)
    }

    .btn-ghost {
      background: transparent;
      color: var(--text3);
      border: 1px solid var(--border)
    }

    .btn-ghost:hover {
      background: var(--bg);
      color: var(--text2)
    }

    .btn-danger {
      background: var(--red-light);
      color: var(--red);
      border: 1px solid #fecaca
    }

    .btn-danger:hover {
      background: #fee2e2
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px
    }

    .btn-icon {
      padding: 7px;
      border-radius: 8px
    }

    /* ===== FILTROS ===== */
    .toolbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap
    }

    .filter-select {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12.5px;
      color: var(--text2);
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      outline: none
    }

    .filter-select:focus {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .1)
    }

    .filter-input {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12.5px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      width: 180px
    }

    .filter-input:focus {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .1)
    }

    .filter-date {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12.5px;
      color: var(--text2);
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      outline: none
    }

    .filter-date:focus {
      border-color: var(--blue2)
    }

    .filter-chip {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text2);
      transition: all .15s
    }

    .filter-chip.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue)
    }

    .filter-chip:hover:not(.active) {
      background: var(--bg)
    }

    .spacer {
      flex: 1
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      box-shadow: var(--shadow)
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    /* ===== KPI CARDS ===== */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px
    }

    .kpi-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      box-shadow: var(--shadow)
    }

    .kpi-label {
      font-size: 11.5px;
      color: var(--text3);
      font-weight: 500;
      margin-bottom: 6px
    }

    .kpi-value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.5px;
      font-family: 'JetBrains Mono', monospace
    }

    .kpi-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px
    }

    .kpi-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 10.5px;
      font-weight: 600
    }

    .kpi-up {
      background: var(--green-light);
      color: var(--green)
    }

    .kpi-dn {
      background: var(--red-light);
      color: var(--red)
    }

    .kpi-bar {
      height: 3px;
      background: var(--border2);
      border-radius: 99px;
      margin-top: 8px;
      overflow: hidden
    }

    .kpi-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .6s ease
    }

    /* ===== DASHBOARD GRID ===== */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px
    }

    .dash-grid-3 {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      margin-bottom: 14px
    }

    /* ===== TABLA ===== */
    .table-wrap {
      overflow-x: auto
    }

    table {
      width: 100%;
      border-collapse: collapse
    }

    thead tr {
      border-bottom: 2px solid var(--border)
    }

    thead th {
      padding: 10px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .4px;
      white-space: nowrap
    }

    tbody tr {
      border-bottom: 1px solid var(--border2);
      transition: background .1s
    }

    tbody tr:hover {
      background: #fafbff
    }
    body.dark tbody tr:hover { background: rgba(255,255,255,.03) }

    tbody td {
      padding: 11px 12px;
      font-size: 13px;
      color: var(--text)
    }

    tbody tr:last-child {
      border-bottom: none
    }

    /* ===== BADGES ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 500
    }

    .badge-ing {
      background: var(--green-light);
      color: var(--green)
    }

    .badge-eg {
      background: var(--red-light);
      color: var(--red)
    }

    .badge-cat {
      background: var(--blue-light);
      color: #1d4ed8
    }

    .badge-med {
      background: var(--purple-light);
      color: var(--purple)
    }

    .badge-comp-boleta {
      background: var(--green-light);
      color: var(--green)
    }

    .badge-comp-factura {
      background: var(--blue-light);
      color: #1d4ed8
    }

    .badge-comp-cotizacion {
      background: var(--yellow-light);
      color: var(--yellow)
    }

    /* ===== AMOUNTS ===== */
    .amount-ing {
      color: var(--green);
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace
    }

    .amount-eg {
      color: var(--red);
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace
    }

    /* ===== BARRA HORIZONTAL ===== */
    .hbar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px
    }

    .hbar-label {
      font-size: 12px;
      color: var(--text2);
      min-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .hbar-track {
      flex: 1;
      height: 6px;
      background: var(--border2);
      border-radius: 99px;
      overflow: hidden
    }

    .hbar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .5s ease
    }

    .hbar-val {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      min-width: 65px;
      text-align: right;
      font-family: 'JetBrains Mono', monospace
    }

    /* ===== CHART ===== */
    .chart-wrap {
      position: relative;
      height: 180px
    }

    .chart-wrap-sm {
      position: relative;
      height: 130px
    }

    /* ===== MODAL ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .4);
      backdrop-filter: blur(3px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem
    }

    .modal {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow-md)
    }

    .modal h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 18px;
      color: var(--text)
    }

    .modal-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border)
    }

    .tipo-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px
    }

    .tipo-btn {
      padding: 10px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      color: var(--text2);
      transition: all .15s
    }

    .tipo-btn.ai {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green)
    }

    .tipo-btn.ae {
      border-color: var(--red);
      background: var(--red-light);
      color: var(--red)
    }

    /* ===== FORM ===== */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    input[type="date"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 36px;
      padding: 6px 8px;
      font-size: 13px
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .form-group.full {
      grid-column: span 2
    }

    label {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text2)
    }

    input,
    select,
    textarea {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      width: 100%;
      transition: border .15s
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .1)
    }

    .error-msg {
      background: var(--red-light);
      border: 1px solid #fecaca;
      color: var(--red);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12.5px;
      margin-bottom: 12px
    }

    /* ===== DOCUMENTO IMPRESIÓN ===== */
    @media print {
      body>* {
        display: none !important
      }

      #_printDoc {
        display: block !important;
        position: fixed;
        inset: 0;
        background: #fff;
        z-index: 99999;
        padding: 20px
      }
    }

    /* ===== EMPTY STATE ===== */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text3)
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 10px
    }

    .empty p {
      font-size: 13px
    }

    /* ========================================
   VISTAS — LOGIN Y ONBOARDING
   Estilos de pantalla de acceso, registro y onboarding inicial
   ======================================== */
    /* ===== LOGIN ===== */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 50%, #f5f3ff 100%);
      padding: 1rem
    }

    .login-card {
      background: var(--white);

        const okB = !S.filtroBusqueda || [m.descripcion, m.categoria, m.cliente, m.medioPago].join(' ').toLowerCase().includes(S.filtroBusqueda.toLowerCase());
        return okT && okM && okD && okC && okB;
      });
    }
    function mesesDisp() {
      const ms = new Set(S.movimientos.map(m => m.fecha ? m.fecha.slice(0, 7) : '').filter(Boolean));
      return [...ms].sort().reverse();
    }
    function todosMov() {
      return S.movimientos.filter(m => (S.filtroMes === 'todos' || (m.fecha && m.fecha.startsWith(S.filtroMes))) && (!S.filtroDia || m.fecha === S.filtroDia));
    }
    function calcKPIs() {
      const datos = movsFiltrados();
      const ing = datos.filter(m => m.tipo === 'Ingreso').reduce((s, m) => s + m.monto, 0);
      const eg = datos.filter(m => m.tipo === 'Egreso').reduce((s, m) => s + m.monto, 0);
      const neto = ing - eg;
      const total = datos.length;
      const ingresos = datos.filter(m => m.tipo === 'Ingreso');
      const ticket = ingresos.length ? Math.round(ing / ingresos.length) : 0;
      return { ing, eg, neto, total, ticket };
    }

    // ============ FIREBASE ============
    async function cargarDatos(uid) {
      // Determinar rol y ownerUid leyendo el perfil del usuario
      let ownerUid = uid; // por defecto admin usa su propio UID
      let rol = 'admin';
      try {
        const perfSnap = await get(ref(db, 'userProfiles/' + uid));
        if (perfSnap.exists()) {
          const perf = perfSnap.val();
          rol = perf.role || 'admin';
          ownerUid = perf.ownerUid || uid;
          S.nombre = perf.nombre || S.nombre || '';
          if (perf.primeraVez === true) S.cambiarPassword = true;
          if (perf.tipo === 'prueba') { S.esPrueba = true; S.negocioTipo = 'prueba'; }
        } else if (S._pendingRole) {
          // Registro en curso: doRegister ya validó el código, usamos el rol pendiente
          rol = S._pendingRole;
          ownerUid = S._pendingOwner || uid;
          const pendingNombre = S._pendingNombre || '';
          S._pendingRole = null; S._pendingOwner = null; S._pendingNombre = null;
          await set(ref(db, 'userProfiles/' + uid), { role: rol, ownerUid, email: S.user?.email || '', nombre: pendingNombre, createdAt: new Date().toISOString() });
          if (pendingNombre) S.nombre = pendingNombre;
          if (rol === 'admin') await set(ref(db, 'config/ownerUid'), uid);
        } else {
          // Primera vez (admin): crear perfil
          await set(ref(db, 'userProfiles/' + uid), { role: 'admin', ownerUid: uid, email: S.user?.email || '', createdAt: new Date().toISOString() });
          await set(ref(db, 'config/ownerUid'), uid);
        }
      } catch (e) { }
      S.rol = rol;
      S.ownerUid = ownerUid;
      // Onboarding: solo para admin que se registró solo (sin panel Cifra)
      if (rol === 'admin') {
        try {
          const cfgSnap = await get(ref(db, 'negocios/' + ownerUid + '/config'));
          if (!cfgSnap.exists()) {
            // Sin config → onboarding
            S.onboarding = true;
            S.onboardingStep = 1;
            S.onboardingData = { rubro: '', nombre: '', ruc: '', whatsapp: '', telefono: '', direccion: '', pais: 'Perú', departamento: '', provincia: '', distrito: '', añosEnMercado: '', ventasMensuales: '', equipo: { cantidad: '', roles: [] }, objetivos: [], modulos: { caja: true, inventario: true, agenda: true, comprobantes: true, entregas: true, ia: false }, categorias: [] };
            render();
          } else {
            const _nc = cfgSnap.val();
            S.negocioConfig = _nc;
            if (_nc?.nombre) S.config.nombre = _nc.nombre;
            if (_nc?.ruc) S.config.ruc = _nc.ruc;
            if (_nc?.telefono) S.config.telefono = _nc.telefono;
            else if (_nc?.whatsapp) S.config.telefono = _nc.whatsapp;
            if (_nc?.direccion) S.config.direccion = _nc.direccion;
            // Si fue creado por admin, saltar onboarding directamente
            if (_nc?.creadoPorAdmin) S.onboarding = false;
            // Primera vez: pedir cambio de contraseña
            if (_nc?.primeraVez === true) { S.cambiarPassword = true; }
            // Tipo de cuenta (prueba / pagado)
            S.negocioTipo = _nc.tipo || 'pagado';
            S.movimientosUsados = _nc.movimientosUsados || 0;
          }
        } catch (e) { }
      } else {
        // Roles no-admin (vendedor, técnico, cajero, etc.): nunca muestran onboarding,
        // usan directamente el ownerUid del perfil para cargar datos
        S.onboarding = false;
      }
      // Si es técnico, solo cargamos entregas del día
      if (rol === 'tecnico') {
        onValue(ref(db, 'users/' + ownerUid + '/entregas'), snap => {
          const l = []; snap.forEach(c => { const v = c.val(); if (v) l.push({ id: c.key, ...v }); });
          // Solo entregas del día asignadas a este técnico
          S.entregas = l.filter(e => e.tecnicoUid === uid || !e.tecnicoUid).sort((a, b) => a.fechaEntrega > b.fechaEntrega ? 1 : -1);
          S.seccion = 'entregas'; render();
        });
        return;
      }
      const p = ownerUid;
      onValue(ref(db, 'users/' + p + '/movimientos'), snap => {
        const l = [];
        snap.forEach(c => { const v = c.val(); if (v && v.monto) l.push({ id: c.key, ...v }); });
        l.sort((a, b) => a.fecha < b.fecha ? 1 : a.fecha > b.fecha ? -1 : a.createdAt < b.createdAt ? 1 : -1);
        S.movimientos = l; _gInit = false; render();
      });
      onValue(ref(db, 'users/' + p + '/clientes'), snap => {
        const l = []; snap.forEach(c => { const v = c.val(); if (v) l.push({ id: c.key, ...v }); });
        S.clientes = l.sort((a, b) => a.nombre > b.nombre ? 1 : -1); render();
      });
      onValue(ref(db, 'users/' + p + '/citas'), snap => {
        const l = []; snap.forEach(c => { const v = c.val(); if (v) l.push({ id: c.key, ...v }); });
        S.citas = l.sort((a, b) => a.fecha > b.fecha ? 1 : a.fecha < b.fecha ? -1 : a.hora > b.hora ? 1 : -1); render();
      });
      onValue(ref(db, 'users/' + p + '/salidas'), snap => {
        const l = []; snap.forEach(c => { const v = c.val(); if (v) l.push({ id: c.key, ...v }); });
        S.salidas = l.sort((a, b) => a.createdAt < b.createdAt ? 1 : -1); render();
      });
      onValue(ref(db, 'users/' + p + '/inventario'), snap => {
        const l = []; snap.forEach(c => { const v = c.val(); if (v) l.push({ id: c.key, ...v }); });
        S.inventario = l; render();
      });
      onValue(ref(db, 'users/' + p + '/comprobantes'), snap => {
        const l = []; snap.forEach(c => { const v = c.val(); if (v) l.push({ id: c.key, ...v }); });
        S.comprobantes = l.sort((a, b) => a.emitidoEn < b.emitidoEn ? 1 : -1); render();
      });
      onValue(ref(db, 'users/' + p + '/entregas'), snap => {
        const l = []; snap.forEach(c => { const v = c.val(); if (v) l.push({ id: c.key, ...v }); });
        S.entregas = l.sort((a, b) => a.fechaEntrega > b.fechaEntrega ? 1 : -1); render();
      });
      onValue(ref(db, 'users/' + p + '/cotizaciones'), snap => {
        const l = []; snap.forEach(c => { const v = c.val(); if (v) l.push({ id: c.key, ...v }); });
        S.cotizaciones = l.sort((a, b) => a.createdAt < b.createdAt ? 1 : -1); render();
      });
      onValue(ref(db, 'users/' + p + '/team'), snap => {
        const l = []; snap.forEach(c => { const v = c.val(); if (v) l.push({ id: c.key, ...v }); });
        S.team = l; render();
      });
      onValue(ref(db, 'users/' + p + '/auditLog'), snap => {
        const l = []; snap.forEach(c => { const v = c.val(); if (v) l.push({ id: c.key, ...v }); });
        S.auditLog = l.sort((a, b) => a.ts < b.ts ? 1 : -1).slice(0, 200); render();
      });
      onValue(ref(db, 'negocios/' + p + '/config'), snap => {
        if (snap.exists()) {
          S.negocioConfig = snap.val();
          const nc = S.negocioConfig;
          if (nc?.nombre) S.config.nombre = nc.nombre;
          if (nc?.ruc) S.config.ruc = nc.ruc;
          if (nc?.telefono) S.config.telefono = nc.telefono;
          else if (nc?.whatsapp) S.config.telefono = nc.whatsapp;
          if (nc?.direccion) S.config.direccion = nc.direccion;
          // Actualizar tipo en tiempo real (para cuando admin activa la cuenta)
          S.negocioTipo = nc.tipo || 'pagado';
          S.movimientosUsados = nc.movimientosUsados || 0;
          // Si pasó a pagado, cerrar el modal de límite
          if (S.negocioTipo === 'pagado') S.showLimiteModal = false;
          render();
        }
      });
    }

        nombre = (document.getElementById('lnombre') || { value: '' }).value.trim(),

      if (pass !== pass2) { S.error = 'Las contraseñas no coinciden'; render(); return; }
      if (pass.length < 6) { S.error = 'Mínimo 6 caracteres'; render(); return; }
      S.error = ''; S.loading = true; render();
      try {
        const anonCred = await signInAnonymously(auth);
        let roleAsignado = ''; let ownerUid = '';
        try {
          const [snapAdmin, snapVen, snapTec, snapOwner] = await Promise.all([
            get(ref(db, 'config/inviteCode')),

          if (cod === cAdmin) roleAsignado = 'admin';
          else if (cVen && cod === cVen) roleAsignado = 'vendedor';
          else if (cTec && cod === cTec) roleAsignado = 'tecnico';
        } finally { await signOut(auth); }
        if (!roleAsignado) { S.error = 'Código de invitación incorrecto'; S.loading = false; render(); return; }
        // Guardar rol ANTES de crear cuenta para que cargarDatos lo use cuando onAuthStateChanged dispare
        S._pendingRole = roleAsignado;

        S.nombre = nombreCompleto;
        if (roleAsignado === 'admin') {
          await set(ref(db, 'config/ownerUid'), newUid);
        } else {
          // Registrar en el equipo del admin
          await set(ref(db, 'users/' + finalOwner + '/team/' + newUid), { role: roleAsignado, email, nombre: nombreCompleto, createdAt: new Date().toISOString() });
        }
        auditoria('register', 'Nuevo usuario registrado: ' + email + ' (' + roleAsignado + ')');

       Agregar, editar, eliminar movimientos; citas; exportar PDF y Excel

    // Movimientos
    window.agregarMov = async () => {
      ['m_fecha', 'm_cat', 'm_desc', 'm_monto', 'm_comp', 'm_medio',
        'm_cliente', 'm_ruc',
        'm_cli_dni', 'm_cli_tel', 'm_cli_email', 'm_cli_dir',
        'm_fechaEntrega', 'm_aCuenta', 'm_rucRazon'].forEach(id => {
          const el = document.getElementById(id); if (el) S._fc[id] = el.value;
        });
      S._fc['m_horaEntrega'] = getTime('m_horaEntrega');
      const c = S._fc;
      const fecha = c.m_fecha || '', comp = c.m_comp || 'Boleta',
        medio = c.m_medio || 'Yape', cliente = (c.m_cliente || '').trim(),
        ruc = (c.m_ruc || '').trim(), tipo = S.nuevoMov.tipo;
      // For ingreso: compute from items; for egreso: use single fields
      let desc, cat, monto;
      if (tipo === 'Ingreso' && S._items && S._items.length > 0) {
        // Recalcular precio de cada item (cantidad * precioUnit) antes de guardar
        S._items.forEach(it => { if (it.precioUnit !== undefined) { it.precio = (parseFloat(it.cantidad || 1) || 1) * (parseFloat(it.precioUnit || 0) || 0); } });
        const validItems = S._items.filter(it => it.desc && parseFloat(it.precio || 0) > 0);
        desc = validItems.map(it => it.desc).join(' + ') || (c.m_desc || '').trim();
        cat = validItems[0]?.cat || c.m_cat || '';
        monto = validItems.reduce((s, it) => s + (parseFloat(it.precio) || 0), 0) || parseFloat(c.m_monto || 0);
      } else {
        desc = (c.m_desc || '').trim();
        cat = c.m_cat || '';
        monto = parseFloat(c.m_monto || 0);
      }
      if (!fecha) { S.error = 'Falta la fecha'; render(); return; }
      if (!cat) { S.error = 'Selecciona una categoría'; render(); return; }
      if (!desc) { S.error = 'Agrega al menos un ítem con descripción'; render(); return; }
      if (isNaN(monto) || monto <= 0) { S.error = 'El monto total debe ser mayor a 0'; render(); return; }
      if (tipo === 'Ingreso' && !S.editMovId) {
        const feVal = (c.m_fechaEntrega || '').trim();
        if (!feVal) { S.error = 'La fecha de entrega es obligatoria'; render(); return; }
      }
      const mov = { fecha, tipo, categoria: cat, descripcion: desc, monto, comprobante: comp, medioPago: medio, cliente, ruc, items: S._items ? S._items.filter(it => it.desc) : undefined };
      try {
        if (S.editMovId) {
          await update(ref(db, 'users/' + S.ownerUid + '/movimientos/' + S.editMovId), mov);
          notif('✅ Movimiento actualizado');
          S.editMovId = null;
          S._fc = {}; S._items = [{ desc: '', cat: 'Cortinas', cantidad: '1', precioUnit: '', precio: '' }]; S.showModal = false; S.error = ''; render(); return;
        }
        // Bloqueo por límite de prueba
        if (S.negocioTipo === 'prueba' && S.movimientosUsados >= 25) { S.showLimiteModal = true; render(); return; }
        mov.createdAt = new Date().toISOString();
        await set(push(ref(db, 'users/' + S.ownerUid + '/movimientos')), mov);
        // Incrementar contador si es cuenta prueba
        if (S.negocioTipo === 'prueba') {
          S.movimientosUsados = (S.movimientosUsados || 0) + 1;
          update(ref(db, 'negocios/' + S.ownerUid + '/config'), { movimientosUsados: S.movimientosUsados }).catch(() => { });
        }
        // Auto-registrar cliente si tiene nombre y no existe aún
        if (cliente) {
          const existe = S.clientes.find(x => x.nombre.trim().toLowerCase() === cliente.toLowerCase());
          if (!existe) {
            const nuevoCliente = {
              nombre: cliente,
              dni: (c.m_cli_dni || '').trim(),
              telefono: (c.m_cli_tel || '').trim(),
              email: (c.m_cli_email || '').trim(),
              direccion: (c.m_cli_dir || '').trim(),
              ruc: (c.m_ruc || '').trim(),
              razonSocial: (c.m_rucRazon || '').trim(),
              createdAt: new Date().toISOString()
            };
            await set(push(ref(db, 'users/' + S.ownerUid + '/clientes')), nuevoCliente);
            notif('✅ Movimiento guardado · Cliente "' + cliente + '" registrado');
          } else {
            notif('✅ Movimiento guardado');
          }
        } else {
          notif('✅ Movimiento guardado');
        }
        auditoria(S.editMovId ? 'edit_movimiento' : 'add_movimiento', tipo + ' ' + fmt(monto) + (cliente ? ' · ' + cliente : ''));
        // Auto-registrar entrega si hay fecha de entrega
        const fechaEntVal = (c.m_fechaEntrega || '').trim();
        const horaEntVal = (c.m_horaEntrega || '09:00').trim();
        const aCuentaVal = parseFloat(c.m_aCuenta || 0);
        if (fechaEntVal && tipo === 'Ingreso') {
          const pendv = monto - aCuentaVal;
          const entData = { cliente, descripcion: desc, fechaEntrega: fechaEntVal, horaEntrega: horaEntVal, monto, aCuenta: aCuentaVal, pendiente: Math.max(0, pendv), estado: pendv <= 0 ? 'Completada' : 'Pendiente', createdAt: new Date().toISOString() };
          set(push(ref(db, 'users/' + S.ownerUid + '/entregas')), entData).catch(() => { });
        }
        S._fc = {}; S._items = [{ desc: '', cat: 'Cortinas', cantidad: '1', precioUnit: '', precio: '' }]; S.showModal = false;
        S.nuevoMov = { fecha: hoy(), tipo: 'Ingreso', categoria: '', descripcion: '', monto: '', comprobante: 'Boleta', medioPago: 'Yape', cliente: '', notas: '' };
        S.error = ''; render();
      } catch (e) { S.error = 'Error al guardar'; render(); }
    };
    window.eliminarMov = async (id) => {
      if (!confirm('¿Eliminar este movimiento?')) return;
      try { await remove(ref(db, 'users/' + S.ownerUid + '/movimientos/' + id)); notif('Eliminado'); }
      catch (e) { notif('Error al eliminar'); }
    };
    window.editarMov = id => {
      const m = S.movimientos.find(x => x.id === id); if (!m) return;
      S.editMovId = id;
      S.nuevoMov.tipo = m.tipo;
      S._fc = {
        m_fecha: m.fecha, m_medio: m.medioPago || 'Yape', m_comp: m.comprobante || 'Boleta',
        m_cliente: m.cliente || '', m_desc: m.descripcion || '', m_cat: m.categoria || '',
        m_monto: String(m.monto || ''), m_notas: m.notas || '',
        m_fechaEntrega: '', m_horaEntrega: '', m_aCuenta: ''
      };
      if (m.items && m.items.length > 0) S._items = m.items.map(it => ({ ...it, cantidad: it.cantidad || '1', precioUnit: it.precioUnit || String(it.precio || '') }));
      else S._items = [{ desc: m.descripcion || '', cat: m.categoria || getCategorias()[0], cantidad: '1', precioUnit: String(m.monto || ''), precio: String(m.monto || '') }];
      S.showModal = true; S.modalTipo = 'movimiento'; S.error = ''; render();
    };
    window.setTipoMov = v => { S.nuevoMov.tipo = v; S._fc = {}; render(); };

    // Citas
    window.agregarCita = async () => {
      ['c_fecha', 'c_cliente', 'c_servicio', 'c_notas', 'c_estado'].forEach(id => {
        const el = document.getElementById(id); if (el) S._fc[id] = el.value;
      });
      S._fc['c_hora'] = getTime('c_hora');
      const c = S._fc;
      const cita = { fecha: c.c_fecha || hoy(), hora: c.c_hora || '09:00', cliente: (c.c_cliente || '').trim(), servicio: c.c_servicio || '', notas: (c.c_notas || '').trim(), estado: c.c_estado || 'Pendiente', createdAt: new Date().toISOString() };
      if (!cita.cliente) { S.error = 'Falta el nombre del cliente'; render(); return; }
      try {
        await set(push(ref(db, 'users/' + S.ownerUid + '/citas')), cita);
        S._fc = {}; S.showModal = false; S.error = ''; notif('✅ Cita agendada'); render();
      } catch (e) { S.error = 'Error al guardar'; render(); }
    };
    window.cambiarEstadoCita = async (id, estado) => {
      try { await update(ref(db, 'users/' + S.ownerUid + '/citas/' + id), { estado }); notif('Estado actualizado'); }
      catch (e) { notif('Error'); }
    };
    window.eliminarCita = async (id) => {
      if (!confirm('¿Eliminar esta cita?')) return;
      try { await remove(ref(db, 'users/' + S.ownerUid + '/citas/' + id)); notif('Cita eliminada'); }
      catch (e) { notif('Error'); }
    };
    window.editarCita = (id) => {
      const c = S.citas.find(x => x.id === id); if (!c) return;
      const ov = document.createElement('div');
      ov.className = 'modal-backdrop'; ov.id = '_editCitaModal';
      ov.innerHTML = `<div class="modal" style="max-width:480px">
    <h2 style="margin-bottom:18px">✏️ Editar cita</h2>
    <div class="form-grid">
      <div class="form-group"><label>Fecha</label><input type="date" id="_ecFecha" value="${c.fecha}"></div>
      <div class="form-group"><label>Hora</label>${timeSelect('_ecHora', c.hora || '09:00')}</div>
      <div class="form-group"><label>Cliente</label><input type="text" id="_ecCliente" value="${c.cliente || ''}"></div>
      <div class="form-group"><label>Servicio</label><select id="_ecServicio">
        ${SERVICIOS.map(s => `<option value="${s}" ${c.servicio === s ? 'selected' : ''}>${s}</option>`).join('')}
      </select></div>
      <div class="form-group"><label>Estado</label><select id="_ecEstado">
        ${['Pendiente', 'Confirmada', 'Completada'].map(e => `<option value="${e}" ${c.estado === e ? 'selected' : ''}>${e}</option>`).join('')}
      </select></div>
      <div class="form-group"><label>Notas</label><input type="text" id="_ecNotas" value="${c.notas || ''}"></div>
    </div>
    <div id="_ecError" style="display:none;color:var(--red);font-size:12.5px;margin:8px 0"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="_ecCancelar">Cancelar</button>
      <button class="btn btn-primary" id="_ecGuardar">💾 Guardar cambios</button>
    </div>
  </div>`;
      document.body.appendChild(ov);
      ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
      document.getElementById('_ecCancelar').addEventListener('click', () => ov.remove());
      document.getElementById('_ecGuardar').addEventListener('click', async () => {
        const cliente = document.getElementById('_ecCliente').value.trim();
        const errEl = document.getElementById('_ecError');
        if (!cliente) { errEl.textContent = 'Falta el nombre del cliente'; errEl.style.display = 'block'; return; }
        const datos = {
          fecha: document.getElementById('_ecFecha').value,
          hora: getTime('_ecHora'),
          cliente,
          servicio: document.getElementById('_ecServicio').value,
          estado: document.getElementById('_ecEstado').value,
          notas: document.getElementById('_ecNotas').value.trim(),
        };
        ov.remove();
        try { await update(ref(db, 'users/' + S.ownerUid + '/citas/' + id), datos); notif('✅ Cita actualizada'); }
        catch (e) { notif('Error al guardar'); }
      });
    };

    /* ========================================
       ACCIONES — INVENTARIO Y CLIENTES
       Productos, salidas, clientes, comprobantes, entregas, cotizaciones y configuración
       ======================================== */
    // Clientes
    window.agregarCliente = async () => {
      ['cl_nombre', 'cl_dni', 'cl_tel', 'cl_email', 'cl_dir', 'cl_notas'].forEach(id => {
        const el = document.getElementById(id); if (el) S._fc[id] = el.value;
      });
      const c = S._fc;
      const cliente = { nombre: (c.cl_nombre || '').trim(), dni: (c.cl_dni || '').trim(), telefono: (c.cl_tel || '').trim(), email: (c.cl_email || '').trim(), direccion: (c.cl_dir || '').trim(), notas: (c.cl_notas || '').trim(), createdAt: new Date().toISOString() };
      if (!cliente.nombre) { S.error = 'Falta el nombre'; render(); return; }
      try {
        await set(push(ref(db, 'users/' + S.ownerUid + '/clientes')), cliente);
        S._fc = {}; S.showModal = false; S.error = ''; notif('✅ Cliente guardado'); render();
      } catch (e) { S.error = 'Error al guardar'; render(); }
    };
    window.verCliente = (id) => {
      const c = S.clientes.find(x => x.id === id); if (!c) return;
      const movs = S.movimientos.filter(m => m.cliente && m.cliente.trim().toLowerCase() === c.nombre.trim().toLowerCase());
      const total = movs.filter(m => m.tipo === 'Ingreso').reduce((s, m) => s + m.monto, 0);
      const ov = document.createElement('div');
      ov.className = 'modal-backdrop'; ov.id = '_clienteModal';
      ov.innerHTML = '<div class="modal" style="max-width:480px">'
        + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">'
        + '<div class="cliente-avatar" style="width:46px;height:46px;font-size:15px;background:#dbeafe;color:#1d4ed8">' + initials(c.nombre) + '</div>'
        + '<div><h2 style="font-size:16px;margin:0">' + c.nombre + '</h2>'
        + '<p style="font-size:12px;color:var(--text3);margin:2px 0">' + (c.dni ? 'DNI: ' + c.dni + ' · ' : '') + (c.telefono || 'Sin teléfono') + (c.email ? ' · ' + c.email : '') + '</p></div></div>'
        + (c.direccion ? '<p style="font-size:12.5px;color:var(--text2);margin-bottom:8px">📍 ' + c.direccion + '</p>' : '')
        + (c.notas ? '<p style="font-size:12.5px;color:var(--text2);margin-bottom:12px;background:var(--bg);padding:8px 10px;border-radius:8px">📝 ' + c.notas + '</p>' : '')
        + '<div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'
        + '<div style="background:var(--green-light);border-radius:8px;padding:10px;text-align:center"><div style="font-size:11px;color:var(--green);font-weight:600">💰 Total compras</div><div style="font-size:17px;font-weight:700;color:var(--green)">' + fmt(total) + '</div><div style="font-size:10px;color:var(--green);opacity:.7;margin-top:2px">Suma de sus ingresos</div></div>'
        + (() => {
          const citasCompletadas = S.citas.filter(x => x.cliente && x.cliente.trim().toLowerCase() === c.nombre.trim().toLowerCase() && x.estado === 'Completada').length;
          const ingCount = movs.filter(m => m.tipo === 'Ingreso').length;
          const visitas = citasCompletadas + ingCount;
          return '<div style="background:var(--blue-light);border-radius:8px;padding:10px;text-align:center"><div style="font-size:11px;color:#1d4ed8;font-weight:600">🗂️ N° de visitas</div><div style="font-size:17px;font-weight:700;color:#1d4ed8">' + visitas + '</div><div style="font-size:10px;color:#1d4ed8;opacity:.7;margin-top:2px">Citas completadas + compras</div></div>';
        })()
        + '</div>'
        + (movs.length > 0 ? '<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">Últimos movimientos</div>'
          + movs.slice(0, 4).map(m => '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border2);font-size:12px">'
            + '<span style="color:var(--text2)">' + m.fecha + ' · ' + m.categoria + '</span>'
            + '<span style="font-weight:600;color:' + (m.tipo === 'Ingreso' ? 'var(--green)' : 'var(--red)') + '">' + (m.tipo === 'Ingreso' ? '+' : '−') + fmt(m.monto) + '</span>'
            + '</div>').join('') : '<p style="color:var(--text3);font-size:12px">Sin movimientos registrados</p>')
        + '</div>'
        + '<div style="display:flex;gap:8px;justify-content:flex-end">'
        + '<button class="btn btn-danger btn-sm" id="_btnElimCliente">Eliminar</button>'
        + '<button class="btn btn-primary btn-sm" id="_btnCerrarCliente">Cerrar</button>'
        + '</div></div>';
      document.body.appendChild(ov);
      ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
      document.getElementById('_btnCerrarCliente').addEventListener('click', () => ov.remove());
      document.getElementById('_btnElimCliente').addEventListener('click', () => { ov.remove(); eliminarCliente(id); });
    };
    window.eliminarCliente = async (id) => {
      if (!confirm('¿Eliminar este cliente?')) return;
      try { await remove(ref(db, 'users/' + S.ownerUid + '/clientes/' + id)); notif('Cliente eliminado'); }
      catch (e) { notif('Error'); }
    };

    // ============ INVENTARIO — FUNCIONES CON EVENT DELEGATION ============
    window.registrarSalidaById = (id) => {
      const p = S.inventario.find(x => x.id === id); if (!p) return;
      const ov = document.createElement('div');
      ov.className = 'modal-backdrop'; ov.id = '_salidaModal';
      ov.innerHTML = '<div class="modal" style="max-width:380px">'
        + '<h2 style="margin-bottom:6px">📤 Registrar salida</h2>'
        + '<p style="font-size:13px;color:var(--text3);margin-bottom:16px">' + p.nombre + '</p>'
        + '<div style="background:var(--bg);border-radius:9px;padding:10px 14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:6px">'
        + '<div style="font-size:12px;color:var(--text3)">Stock actual</div>'
        + '<div style="font-size:14px;font-weight:600;color:var(--text);font-family:JetBrains Mono,monospace">' + p.stock + ' ' + (p.unidad || 'und') + '</div>'
        + '<div style="font-size:12px;color:var(--text3)">Stock mínimo</div>'
        + '<div style="font-size:14px;font-weight:600;color:' + (p.stock <= p.stockMin ? 'var(--red)' : 'var(--text3)') + ';font-family:JetBrains Mono,monospace">' + p.stockMin + ' ' + (p.unidad || 'und') + '</div>'
        + '</div>'
        + '<div class="form-group" style="margin-bottom:16px">'
        + '<label>Cantidad que sale</label>'
        + '<input type="number" id="_salidaCant" min="0.1" step="0.1" max="' + p.stock + '" placeholder="Ej: 5" style="font-size:16px;text-align:center" autofocus>'
        + '</div>'
        + '<div id="_salidaError" style="display:none;color:var(--red);font-size:12.5px;margin-bottom:10px"></div>'
        + '<div class="modal-footer">'
        + '<button class="btn btn-ghost" id="_salidaCancelar">Cancelar</button>'
        + '<button class="btn btn-primary" id="_salidaConfirm">✅ Confirmar salida</button>'
        + '</div></div>';
      document.body.appendChild(ov);
      ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
      document.getElementById('_salidaCancelar').addEventListener('click', () => ov.remove());
      const inp = document.getElementById('_salidaCant');
      inp.focus();
      document.getElementById('_salidaConfirm').addEventListener('click', async () => {
        const cant = parseFloat(inp.value);
        const errEl = document.getElementById('_salidaError');
        if (isNaN(cant) || cant <= 0) { errEl.textContent = 'Ingresa una cantidad válida'; errEl.style.display = 'block'; return; }
        if (cant > p.stock) { errEl.textContent = 'No hay suficiente stock (máx: ' + p.stock + ')'; errEl.style.display = 'block'; return; }
        const nuevoStock = Math.round((p.stock - cant) * 100) / 100;
        ov.remove();
        try {
          await update(ref(db, 'users/' + S.ownerUid + '/inventario/' + id), { stock: nuevoStock });
          const salida = {
            productoId: id, nombre: p.nombre,
            cantidad: cant, stockAntes: p.stock, stockDespues: nuevoStock,
            fecha: hoy(),
            hora: new Date().toTimeString().slice(0, 5),
            createdAt: new Date().toISOString()
          };
          await set(push(ref(db, 'users/' + S.ownerUid + '/salidas')), salida);
          notif('✅ Salida registrada. Stock nuevo: ' + nuevoStock);
        } catch (e) { notif('Error al registrar salida'); }
      });
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('_salidaConfirm').click(); });
    };

    window.eliminarProducto = async (id) => {
      if (!confirm('¿Eliminar este producto?')) return;
      try { await remove(ref(db, 'users/' + S.ownerUid + '/inventario/' + id)); notif('Eliminado'); }
      catch (e) { notif('Error'); }
    };
    window.eliminarComprobante = async (id) => {
      if (!confirm('¿Eliminar este comprobante? Solo se elimina el registro, no el movimiento.')) return;
      try { await remove(ref(db, 'users/' + S.ownerUid + '/comprobantes/' + id)); notif('Comprobante eliminado'); }
      catch (e) { notif('Error al eliminar'); }
    };

    window.eliminarSalida = async (id) => {
      if (!confirm('¿Eliminar este registro de salida?')) return;
      try { await remove(ref(db, 'users/' + S.ownerUid + '/salidas/' + id)); notif('Eliminado'); }
      catch (e) { notif('Error al eliminar'); }
    };

    window.editarSalida = (id) => {
      const s = S.salidas.find(x => x.id === id); if (!s) return;
      const ov = document.createElement('div');
      ov.className = 'modal-backdrop'; ov.id = '_editSalidaModal';
      ov.innerHTML = '<div class="modal" style="max-width:380px">'
        + '<h2 style="margin-bottom:6px">✏️ Editar salida</h2>'
        + '<p style="font-size:13px;color:var(--text3);margin-bottom:16px">' + s.nombre + '</p>'
        + '<div class="form-grid">'
        + '<div class="form-group"><label>Fecha</label><input type="date" id="_esFecha" value="' + s.fecha + '"></div>'
        + '<div class="form-group"><label>Hora</label>' + timeSelect('_esHora', s.hora || '09:00') + '</div>'
        + '<div class="form-group full"><label>Cantidad salida</label><input type="number" id="_esCant" min="0.1" step="0.1" value="' + s.cantidad + '" style="font-size:16px;text-align:center"></div>'
        + '</div>'
        + '<div id="_esError" style="display:none;color:var(--red);font-size:12.5px;margin:8px 0"></div>'
        + '<div class="modal-footer">'
        + '<button class="btn btn-ghost" id="_esCancelar">Cancelar</button>'
        + '<button class="btn btn-primary" id="_esGuardar">💾 Guardar cambios</button>'
        + '</div></div>';
      document.body.appendChild(ov);
      ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
      document.getElementById('_esCancelar').addEventListener('click', () => ov.remove());
      document.getElementById('_esGuardar').addEventListener('click', async () => {
        const cant = parseFloat(document.getElementById('_esCant').value);
        const fecha = document.getElementById('_esFecha').value;
        const hora = getTime('_esHora');
        const errEl = document.getElementById('_esError');

      const ticketCat = {}; datosFijos.filter(m => m.tipo === 'Ingreso').forEach(m => { if (!ticketCat[m.categoria]) ticketCat[m.categoria] = { sum: 0, cnt: 0 }; ticketCat[m.categoria].sum += m.monto; ticketCat[m.categoria].cnt++; });

    window.cpCheckStrength = function () {
      const v = document.getElementById('cp-pw1').value;
      const reqs = { len: v.length >= 8, upper: /[A-Z]/.test(v), num: /[0-9]/.test(v), special: /[^A-Za-z0-9]/.test(v) };
      document.getElementById('req-len').className = 'cp-req' + (reqs.len ? ' ok' : '');
      document.getElementById('req-upper').className = 'cp-req' + (reqs.upper ? ' ok' : '');
      document.getElementById('req-num').className = 'cp-req' + (reqs.num ? ' ok' : '');
      document.getElementById('req-special').className = 'cp-req' + (reqs.special ? ' ok' : '');
      const score = Object.values(reqs).filter(Boolean).length;
      const bar = document.getElementById('cp-str-bar');
      const lbl = document.getElementById('cp-str-label');
      const cfg = [
        { w: '0%', bg: '#e2e8f0', txt: '' },
        { w: '25%', bg: '#ef4444', txt: 'Muy débil' },
        { w: '50%', bg: '#f59e0b', txt: 'Débil' },
        { w: '75%', bg: '#3b82f6', txt: 'Buena' },
        { w: '100%', bg: '#22c55e', txt: 'Fuerte' },
      ][score];
      bar.style.width = cfg.w; bar.style.background = cfg.bg;
      lbl.textContent = cfg.txt; lbl.style.color = cfg.bg;
      const i = document.getElementById('cp-pw1');
      i.className = 'cp-input' + (v ? (score >= 3 ? ' valid' : ' invalid') : '');
      cpCheckMatch();
    };

    window.cpCheckMatch = function () {
      const v1 = document.getElementById('cp-pw1')?.value || '';
      const v2 = document.getElementById('cp-pw2')?.value || '';
      const i = document.getElementById('cp-pw2');
      if (!i) return;
      if (!v2) i.className = 'cp-input';
      else i.className = 'cp-input' + (v2 === v1 ? ' valid' : ' invalid');

    window.doSetPassword = async function () {
      const pw1 = document.getElementById('cp-pw1')?.value || '';
      const pw2 = document.getElementById('cp-pw2')?.value || '';
      const errBox = document.getElementById('cp-err-box');
      const btn = document.getElementById('cp-submit-btn');
      const showErr = msg => { errBox.textContent = '⚠️ ' + msg; errBox.style.display = 'flex'; };
      if (pw1.length < 8) { showErr('La contraseña debe tener al menos 8 caracteres.'); return; }
      if (pw1 !== pw2) { showErr('Las contraseñas no coinciden.'); return; }
      errBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Guardando...';
      try {
        await updatePassword(S.user, pw1);
        // Marcar primeraVez=false en userProfile y en config del negocio
        const uid = S.user.uid;
        const ownerUid = S.ownerUid || uid;
        try { await update(ref(db, 'userProfiles/' + uid), { primeraVez: false }); } catch (e) { }
        if (S.rol === 'admin' || ownerUid === uid) {
          try { await update(ref(db, 'negocios/' + ownerUid + '/config'), { primeraVez: false }); } catch (e) { }
        }
        S.cambiarPassword = false;
        S.passwordExito = true;
        render();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Guardar y continuar →';
        const msgs = {
          'auth/requires-recent-login': 'Tu sesión expiró. Cierra sesión, vuelve a ingresar y repite este paso.',
          'auth/weak-password': 'La contraseña es demasiado débil. Usa al menos 8 caracteres.',
        };
        showErr(msgs[e.code] || 'Error al guardar: ' + e.message);
      }
    };

    window.adminSincronizarNegocio = async function (negId) {
      try {
        const [cfgSnap, profSnap, adminSnap] = await Promise.all([
          get(ref(db, 'negocios/' + negId + '/config')),
          get(ref(db, 'userProfiles/' + negId)),
          get(ref(db, 'admin/negocios/' + negId)),
        ]);
        const cfg = cfgSnap.exists() ? cfgSnap.val() : {};
        const prof = profSnap.exists() ? profSnap.val() : {};
        const adminData = adminSnap.exists() ? adminSnap.val() : {};
        const nombreUsuario = prof.nombre || adminData.adminNombre || '';
        const updates = {
          nombre: cfg.nombre || adminData.nombre || '(sin configurar)',
          rubro: cfg.rubro || '',
          ruc: cfg.ruc || '',
          distrito: cfg.distrito || '',
          direccion: cfg.direccion || '',
          telefono: cfg.telefono || cfg.whatsapp || '',
          tipo: cfg.tipo || adminData.tipo || 'prueba',
          adminNombre: nombreUsuario,
          ...(cfg.fechaCreacion ? { fechaInicio: cfg.fechaCreacion.slice(0, 10) } : {}),
        };
        // Also update nombre in usuarios[0]
        const usuarios = adminData.usuarios || [];
        if (usuarios.length > 0 && !usuarios[0].nombre && nombreUsuario) {
          usuarios[0].nombre = nombreUsuario;
          updates.usuarios = usuarios;
        }
        await update(ref(db, 'admin/negocios/' + negId), updates);
        const neg = S.adminNegocios.find(n => n.id === negId);
        if (neg) Object.assign(neg, updates);
        notif('✅ Datos sincronizados correctamente');
        render();
      } catch (e) { notif('Error al sincronizar: ' + e.message); }

    window.adminCrearNegocio = async function () {
      // Leer valores directo del DOM para evitar pérdidas por re-renders
      const g = id => ((document.getElementById(id) || {}).value || '').trim();
      const f = {
        nombre: g('acf_nombre'),
        rubro: g('acf_rubro') || S.adminFormData?.rubro || 'otro',
        distrito: g('acf_distrito'),
        direccion: g('acf_direccion'),
        ruc: g('acf_ruc'),
        negTel: g('acf_negTel'),
        negEmail: g('acf_negEmail'),
        fechaInicio: g('acf_fechaInicio'),
        adminEmail: g('acf_adminEmail'),
        adminNombre: g('acf_adminNombre'),
        adminDni: g('acf_adminDni'),
        adminTelPersonal: g('acf_adminTelPersonal'),
        adminTel: g('acf_adminTel'),
        adminPass: g('acf_adminPass'),
        user2Email: g('acf_u2Email'),
        user2Nombre: g('acf_u2Nombre'),
        user2Dni: g('acf_u2Dni'),
        user2Tel: g('acf_u2Tel'),
        user2Rol: g('acf_u2Rol') || 'vendedor',
        user2Pass: g('acf_u2Pass'),
        showUser2: S.adminFormData?.showUser2 || false,
        modulos: S.adminFormData?.modulos || null,
        categorias: S.adminFormData?.categorias || null,
      };
      // Guardar en S.adminFormData para que el re-render no pierda los valores
      S.adminFormData = { ...S.adminFormData, ...f };
      if (!f.nombre || !f.adminEmail || !f.adminPass || !f.adminNombre) {
        S.adminCrearError = 'Completa: nombre del negocio, correo, nombre y contraseña del admin.';
        _renderKeepScroll(); return;
      }
      S.adminCreando = true; S.adminCrearError = '';
      // Mostrar spinner sin perder scroll
      const btnEl = document.querySelector('#acm_modal_body button[onclick="adminCrearNegocio()"]');
      if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Creando...'; }

      try {
        const ts = new Date().toISOString();
        const r = f.rubro || 'otro';
        const finalMods = f.modulos || { ...(OB_PRESETS[r] || OB_PRESETS.otro) };
        const finalCats = Array.isArray(f.categorias) && f.categorias.length > 0 ? f.categorias : [...(OB_CAT_PRESETS[r] || OB_CAT_PRESETS.otro)];
        const usuarios = [];

        // 1. Crear admin (o recuperar si ya existe) → authSec autenticado como admUid
        let admCred;
        try { admCred = await createUserWithEmailAndPassword(authSec, f.adminEmail, f.adminPass); }
        catch (e) { if (e.code === 'auth/email-already-in-use') { admCred = await signInWithEmailAndPassword(authSec, f.adminEmail, f.adminPass); } else throw e; }
        const admUid = admCred.user.uid;
        usuarios.push({ uid: admUid, nombre: f.adminNombre, email: f.adminEmail, pass: f.adminPass, tel: f.adminTel || '', dni: f.adminDni || '', telPersonal: f.adminTelPersonal || '', rol: 'admin' });

        // 2. Escribir datos del admin con dbSec (auth = admUid)
        await set(ref(dbSec, 'userProfiles/' + admUid), { role: 'admin', ownerUid: admUid, email: f.adminEmail, nombre: f.adminNombre, dni: f.adminDni || '', telefono: f.adminTelPersonal || '', whatsapp: f.adminTel || '', createdAt: ts, creadoPorAdmin: true, primeraVez: true });
        await set(ref(dbSec, 'negocios/' + admUid + '/config'), {
          nombre: f.nombre, rubro: r, distrito: f.distrito || '', direccion: f.direccion || '',
          ruc: f.ruc || '', telefono: f.negTel || '', email: f.negEmail || '',
          fechaInicio: f.fechaInicio || ts.slice(0, 10),
          modulos: finalMods, categorias: finalCats,
          plan: PLAN_PRECIO, estado: 'activo',
          onboardingCompleto: true, creadoPorAdmin: true, primeraVez: true, fechaCreacion: ts
        });

        // 3. Crear segundo usuario si aplica
        let user2Uid = null;
        if (f.showUser2 && f.user2Email && f.user2Pass) {
          let u2Cred;
          try { u2Cred = await createUserWithEmailAndPassword(authSec, f.user2Email, f.user2Pass); }
          catch (e) { if (e.code === 'auth/email-already-in-use') { u2Cred = await signInWithEmailAndPassword(authSec, f.user2Email, f.user2Pass); } else throw e; }
          user2Uid = u2Cred.user.uid;
          usuarios.push({ uid: user2Uid, nombre: f.user2Nombre || '', email: f.user2Email, pass: f.user2Pass, tel: f.user2Tel || '', dni: f.user2Dni || '', rol: f.user2Rol || 'vendedor' });
          await set(ref(dbSec, 'userProfiles/' + user2Uid), { role: f.user2Rol || 'vendedor', ownerUid: admUid, email: f.user2Email, nombre: f.user2Nombre || '', dni: f.user2Dni || '', telefono: f.user2Tel || '', createdAt: ts, creadoPorAdmin: true, primeraVez: true });
        }

        // 4. Registrar en admin/negocios — intento silencioso, no bloquea si falla por reglas
        try {
          await set(ref(dbSec, 'admin/negocios/' + admUid), {
            nombre: f.nombre, rubro: r, distrito: f.distrito || '', direccion: f.direccion || '',
            ruc: f.ruc || '', telefono: f.negTel || '', email: f.negEmail || '', fechaInicio: f.fechaInicio || ts.slice(0, 10),
            adminEmail: f.adminEmail, adminNombre: f.adminNombre,
            plan: PLAN_PRECIO, estado: 'activo', fechaCreacion: ts,
            usuarios: usuarios.map(u => ({ uid: u.uid, nombre: u.nombre, email: u.email, rol: u.rol, pass: u.pass || '', tel: u.tel || '', dni: u.dni || '' }))
          });
        } catch (_) {
          // Si las reglas bloquean admin/negocios, guardamos solo en el config del negocio
          // El panel admin lo puede leer desde negocios/{uid}/config con creadoPorAdmin:true
        }

        S.adminNegocioCreado = { nombre: f.nombre, rubro: r, distrito: f.distrito || '', usuarios };
        S.adminShowCrear = false; S.adminFormData = {}; S.adminCreando = false;
        render();
      } catch (e) {
        S.adminCrearError = 'Error: ' + (e.message || e.code || 'Permiso denegado — revisa las reglas de Firebase');
        S.adminCreando = false;

          // Mini calendario

          const primerDia = new Date(ahora2.getFullYear(), ahora2.getMonth(), 1);

          const inicioSem = primerDia.getDay() === 0 ? 6 : primerDia.getDay() - 1;

      /* ========================================
