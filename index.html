            + '<div style="font-size:12px;color:var(--text2)">Total: <span id="cot_total_display" style="font-size:16px;font-weight:800;color:var(--text);font-family:\'JetBrains Mono\',monospace">' + fmt(totalCot) + '</span></div>'
            + '<div id="cot_margen_display" style="font-size:12px;font-weight:600;color:' + margenCol + '">' + cotMargenHtml + '</div>'
            + '</div>'
            + '</div>'
            + '<div class="modal-footer" style="padding:12px 20px">'
            + '<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>'
            + '<button class="btn btn-primary" onclick="guardarCotizacion()" ' + cotSaveDisabled + '>💾 Guardar cotización</button>'
            + '</div>'
            + '</div></div>';
        } else if (S.modalTipo === 'entrega') {
          modalHtml = `<div class="modal-backdrop" onclick="if(event.target===this)closeModal()"><div class="modal">
        <h2>📦 Nueva entrega</h2>
        ${S.error ? `<div class="error-msg">${S.error}</div>` : ''}
        <div style="display:flex;flex-direction:column;gap:10px">
          <div class="form-group"><label>Cliente</label><input type="text" id="ent_cliente" placeholder="Nombre del cliente" value="${S._fc['ent_cliente'] || ''}" list="cl-ent"><datalist id="cl-ent">${S.clientes.map(c => `<option value="${c.nombre}">`).join('')}</datalist></div>
          <div class="form-group"><label>Descripción del trabajo</label><input type="text" id="ent_desc" placeholder="Ej: Cortinas blackout sala" value="${S._fc['ent_desc'] || ''}"></div>
          <div class="form-group"><label>Fecha de entrega</label><input type="date" id="ent_fecha" value="${S._fc['ent_fecha'] || ''}"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="form-group" style="margin:0"><label>Total (S/.)</label><input type="number" id="ent_monto" placeholder="0.00" min="0" step="0.01" value="${S._fc['ent_monto'] || ''}" oninput="calcSaldoEnt()"></div>
            <div class="form-group" style="margin:0"><label>A cuenta (adelanto)</label><input type="number" id="ent_acuenta" placeholder="0.00" min="0" step="0.01" value="${S._fc['ent_acuenta'] || ''}" oninput="calcSaldoEnt()"></div>
          </div>
          <div class="form-group"><label>Saldo pendiente</label><input type="text" id="ent_saldo" readonly placeholder="S/.0.00" style="background:var(--border2);color:var(--red);font-weight:600;font-family:'JetBrains Mono',monospace"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="agregarEntrega()">💾 Guardar</button>
        </div>
      </div></div>`;
        } else if (S.modalTipo === 'producto') {
          modalHtml = `<div class="modal-backdrop" onclick="if(event.target===this)closeModal()"><div class="modal">
        <h2>📦 Nuevo producto</h2>
        ${S.error ? `<div class="error-msg">${S.error}</div>` : ''}
        <div class="form-grid">
          <div class="form-group full"><label>Nombre del producto</label><input type="text" id="p_nombre" placeholder="Ej: Tela Blackout metro" value="${S._fc['p_nombre'] || ''}"></div>
          <div class="form-group"><label>Categoría</label><input type="text" id="p_cat" placeholder="Ej: Telas, Rieles..." value="${S._fc['p_cat'] || ''}"></div>
          <div class="form-group"><label>Unidad</label><input type="text" id="p_unidad" placeholder="und, mt, kg..." value="${S._fc['p_unidad'] || 'und'}"></div>
          <div class="form-group"><label>Stock actual</label><input type="number" id="p_stock" placeholder="0" min="0" step="0.1" value="${S._fc['p_stock'] || '0'}"></div>
          <div class="form-group"><label>Stock mínimo</label><input type="number" id="p_stockmin" placeholder="5" min="0" step="0.1" value="${S._fc['p_stockmin'] || '5'}"></div>
          <div class="form-group"><label>Precio (S/.)</label><input type="number" id="p_precio" placeholder="0.00" min="0" step="0.01" value="${S._fc['p_precio'] || '0'}"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="agregarProducto()">💾 Guardar</button>
        </div>
      </div></div>`;
        }
      }

      document.getElementById('app').innerHTML = `
  <div class="mob-overlay" onclick="closeSidebar()"></div>
  <div class="layout">
    <nav class="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <div>
          <div class="sb-logo-name">Sesko</div>
          <div class="sb-logo-sub">${S.negocioConfig?.nombre || S.config.nombre || 'Mi negocio'}</div>
        </div>
      </div>
      <div class="sb-nav">${sbHtml}</div>
      <div class="sb-bottom">
        <div class="sb-user">
          <div class="sb-avatar">${S.user?.email?.[0]?.toUpperCase() || '?'}</div>
          <div style="flex:1;min-width:0">
            <div class="sb-user-email">${S.user?.email || ''}</div>
            <div style="font-size:9px;margin-top:2px;padding:1px 6px;border-radius:99px;display:inline-block;${S.rol === 'admin' ? 'background:rgba(59,130,246,.25);color:#93c5fd' : S.rol === 'vendedor' ? 'background:rgba(16,185,129,.2);color:#6ee7b7' : 'background:rgba(251,191,36,.2);color:#fcd34d'}">${S.rol === 'admin' ? 'Admin' : S.rol === 'vendedor' ? 'Vendedor' : 'Técnico'}</div>
          </div>
          <div class="sb-logout" onclick="doLogout()">Salir</div>
        </div>
      </div>
    </nav>
    <div class="main">
      <div class="topbar">
        <button class="mob-menu-btn" onclick="toggleSidebar()" aria-label="Menú">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-left">
          <h1>${topbarTitle}</h1>
          <p>${topbarSub}</p>
        </div>
        <div class="topbar-right">
          ${S.seccion === 'dashboard' ? `<select class="filter-select" style="font-size:12px;padding:4px 8px;border-radius:7px;height:30px" onchange="setMes(this.value)"><option value="todos" ${S.filtroMes === 'todos' ? 'selected' : ''}>Todo el año</option>${meses.map(m => `<option value="${m}" ${S.filtroMes === m ? 'selected' : ''}>${MESES[parseInt(m.slice(5)) - 1]} ${m.slice(0, 4)}</option>`).join('')}</select>` : ''}
          <div class="dark-btn" onclick="toggleDark()" title="Modo oscuro/claro">${S.darkMode ? '☀️' : '🌙'}</div>
          <div class="notif-btn" onclick="toggleNotifPanel()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            ${getNotificaciones().length > 0 ? '<div class="notif-badge"></div>' : ''}
          </div>
          <button id="btn-nuevo" class="btn btn-primary btn-sm btn-nuevo-mob" onclick="openModal('movimiento')">+ <span class="btn-long-text">Nuevo movimiento</span><span class="btn-short-text" style="display:none">Nuevo</span></button>
        </div>
      </div>
      ${S.showNotifPanel ? `<div style="position:fixed;inset:0;z-index:149" onclick="closeNotifPanel()"></div><div class="notif-panel">
        <div class="notif-panel-header">Notificaciones <span class="notif-panel-close" onclick="closeNotifPanel()">✕</span></div>
        ${(() => { const ns = getNotificaciones(); return ns.length === 0 ? '<div style="padding:16px;text-align:center;font-size:12px;color:var(--text3)">Sin notificaciones</div>' : ns.map(n => `<div class="notif-item-p" onclick="event.stopPropagation();ir('${n.link}','${n.sub}');closeNotifPanel()"><div class="notif-ic ${n.tipo}">${n.ic}</div><div><div class="notif-text">${n.texto}</div></div></div>`).join(''); })()}
      </div>`: ''}
      ${_trialBanner}
      ${toolbarHtml}
      <div class="content">${contenido}</div>
    </div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
      // Inject modal separately to avoid template literal nesting issues
      let mr = document.getElementById('_modal_root');
      if (!mr) { mr = document.createElement('div'); mr.id = '_modal_root'; document.body.appendChild(mr); }
      mr.innerHTML = modalHtml;

      // ── TOUR DE BIENVENIDA ──────────────────────────────────────────
      if (S.seccion === 'dashboard' && S.negocioConfig && S.negocioConfig.tourCompletado !== true && !S._tourMostrado && !S.onboarding) {
        S.tourActivo = true; S.tourPaso = 0; S._tourMostrado = true;
      }
      let tr = document.getElementById('_tour_root');
      if (!tr) { tr = document.createElement('div'); tr.id = '_tour_root'; document.body.appendChild(tr); }
      if (S.tourActivo) {
        const _TOUR_PASOS = [
          { selector: '#btn-nuevo, .btn-nuevo-mob', pos: 'bottom-left',  titulo: 'Empieza aquí — registra tu primera venta',   texto: 'Cada ingreso o gasto de tu negocio se registra con este botón. Es lo primero que debes hacer para que Sesko empiece a trabajar para ti.' },
          { selector: '.kpi-grid',                  pos: 'bottom-center', titulo: 'Tus métricas en tiempo real',                  texto: 'Una vez que registres movimientos, aquí verás tus ingresos, egresos y ganancia neta actualizándose automáticamente.' },
          { selector: '[data-nav="caja"]',           pos: 'right',         titulo: 'Caja y ventas — tu historial',                texto: 'Aquí ves todos tus movimientos registrados. Filtra por mes, categoría o busca cualquier venta.' },
          { selector: '[data-nav="inventario"]',     pos: 'right',         titulo: 'Inventario — sin quedarte sin stock',         texto: 'Agrega tus productos con stock mínimo y Sesko te avisa antes de que se agoten.' },
          { selector: '[data-nav="clientes"]',       pos: 'right',         titulo: 'Clientes — se crean solos',                   texto: 'Cada venta con nombre de cliente queda guardada aquí. Con 5 compras el cliente pasa a VIP automáticamente.' },
          { selector: '[data-nav="entregas"]',       pos: 'right',         titulo: 'Entregas — nunca pierdas un pedido',          texto: 'Tus pedidos con fecha de entrega aparecen aquí. Verás alertas cuando una entrega esté por vencer.' + ((S.negocioTipo==='prueba'||S.esPrueba) ? ' — disponible en cuenta activa.' : '') },
          { selector: '#cfg_nombre',                 pos: 'bottom',        titulo: 'Configuración de tu negocio',        texto: 'Aquí encontrarás todos los datos de tu empresa. Puedes actualizar el nombre, subir tu logo, añadir categorías de productos y mantener tu información siempre al día.', final: true },
        ];
        const paso = _TOUR_PASOS[S.tourPaso];
        // Paso 7 navega a config y deja que ese render muestre el tooltip
        if (S.tourPaso === 6 && S.seccion !== 'config') { ir('config'); return; }
        const el = document.querySelector(paso.selector);
        if (el && S.tourPaso === 6) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(() => render(), 350);
        }
        let hlStyle = '', ttStyle = '', arrowStyle = '';
        if (el) {
          const r = el.getBoundingClientRect();
          const PAD = 6;
          hlStyle = `position:fixed;top:${r.top-PAD}px;left:${r.left-PAD}px;width:${r.width+PAD*2}px;height:${r.height+PAD*2}px;border-radius:10px;border:2px solid #3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.18);z-index:9000;pointer-events:none`;
          const TW = 252, TH_EST = 200;
          let ttTop, ttLeft, arrow = '';
          if (paso.pos === 'right') {
            ttTop = Math.min(r.top, window.innerHeight - TH_EST - 12);
            ttLeft = r.right + 14;
            arrow = `position:absolute;left:-8px;top:20px;width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:8px solid #2a2d3a`;
          } else if (paso.pos === 'bottom-left') {
            ttTop = r.bottom + 12; ttLeft = r.left;
            arrow = `position:absolute;top:-8px;left:18px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid #2a2d3a`;
          } else if (paso.pos === 'bottom-center') {
            ttTop = r.bottom + 12; ttLeft = Math.max(8, r.left + r.width/2 - TW/2);
            arrow = `position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid #2a2d3a`;
          } else {
            ttTop = r.bottom + 12; ttLeft = r.left;
            arrow = `position:absolute;top:-8px;left:18px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid #2a2d3a`;
          }
          ttLeft = Math.min(ttLeft, window.innerWidth - TW - 12);
          ttStyle = `position:fixed;top:${ttTop}px;left:${ttLeft}px;width:${TW}px;z-index:9001`;
          arrowStyle = arrow;
        }
        const puntos = Array.from({length:7},(_,i)=>`<div style="height:6px;border-radius:3px;transition:all .2s;background:${i===S.tourPaso?'#3b82f6':i<S.tourPaso?'rgba(59,130,246,.4)':'rgba(255,255,255,.15)'};width:${i===S.tourPaso?'20px':'6px'}"></div>`).join('');
        tr.innerHTML = `
          <div style="position:fixed;inset:0;background:rgba(10,12,20,.65);z-index:8999" onclick=""></div>
          ${el ? `<div style="${hlStyle}"></div>` : ''}
          <div style="${ttStyle};background:#0f172a;border:1px solid #2a2d3a;border-radius:10px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.5)">
            <div style="${arrowStyle}"></div>
            <div style="display:flex;gap:4px;align-items:center;margin-bottom:10px">${puntos}</div>
            <div style="font-size:9px;font-family:monospace;color:#3b82f6;letter-spacing:.6px;font-weight:700;margin-bottom:6px">PASO ${S.tourPaso+1} DE 7</div>
            <div style="font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:6px;line-height:1.35">${paso.titulo}</div>
            <div style="font-size:11.5px;color:#94a3b8;line-height:1.55;margin-bottom:14px">${paso.texto}</div>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <button onclick="tourSkip()" style="background:none;border:none;color:rgba(255,255,255,.3);font-size:11px;cursor:pointer;padding:0">Saltar tour</button>
              <button onclick="tourNext()" style="background:${paso.final?'#059669':'#3b82f6'};color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">${paso.final?'¡Listo, empecemos! →':'Siguiente →'}</button>
            </div>
          </div>`;
      } else {
        tr.innerHTML = '';
      }
      // ────────────────────────────────────────────────────────────────
    }

    // ============ AUTH ============
    onAuthStateChanged(auth, user => {
      S.inicializando = false;
      if (user) {
        S.user = user; S.error = ''; S.loading = false;
        if (!user.isAnonymous) {
          if (user.email === SUPER_ADMIN_EMAIL) { render(); cargarNegociosAdmin(); }
          else cargarDatos(user.uid);
        }
      }
      else { S.user = null; S.movimientos = []; S.clientes = []; S.citas = []; S.inventario = []; S.comprobantes = []; S.salidas = []; S.entregas = []; S.cotizaciones = []; S.loading = false; render(); }
    });
    render();

    // ============ PWA SERVICE WORKER ============
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => { });
    }
  </script>
</body>

</html>
