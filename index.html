<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sesko — Sistema de Gestión</title>
<meta name="theme-color" content="#1e2235">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sesko">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--white:#ffffff;--sidebar:#1e2235;--sidebar2:#252b42;
  --primary:#4f46e5;--primary2:#4338ca;--primary-light:#eef2ff;--blue:#2563eb;--blue2:#3b82f6;--blue-light:#eff6ff;
  --green:#059669;--green-light:#ecfdf5;
  --red:#dc2626;--red-light:#fef2f2;
  --yellow:#d97706;--yellow-light:#fffbeb;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;--text4:#cbd5e1;
  --border:#e2e8f0;--border2:#f1f5f9;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;transition:background .3s,color .3s}
body.dark{
  --bg:#0f1117;--white:#1a1d27;--border:#2a2d3a;--border2:#1f2230;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --primary-light:#2d2a5e;--green-light:#064e3b;--red-light:#450a0a;
  --yellow-light:#451a03;--purple-light:#2d1b69;--blue-light:#1e3a5f;
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.4);
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== LAYOUT ===== */
#app{min-height:100vh}
.layout{display:flex;min-height:100vh}

/* ===== SIDEBAR ===== */
.sidebar{width:220px;background:var(--sidebar);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.sb-logo{padding:20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-logo-mark{width:34px;height:34px;border-radius:9px;background:var(--blue2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-mark svg{width:20px;height:20px}
.sb-logo-name{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px}

.sb-nav{flex:1;padding:8px 10px;overflow-y:auto;min-height:0;scrollbar-width:thin}
.sb-group{margin-bottom:2px}
.sb-group-header{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;user-select:none}
.sb-group-header:hover{background:rgba(255,255,255,.05)}
.sb-group-header.open{background:rgba(59,130,246,.15)}
.sb-group-icon{width:18px;height:18px;font-size:15px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sb-group-label{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.7);flex:1}
.sb-group-arrow{font-size:9px;color:rgba(255,255,255,.25);transition:transform .2s}
.sb-group-header.open .sb-group-arrow{transform:rotate(90deg)}
.sb-children{overflow:hidden;max-height:0;transition:max-height .25s ease}
.sb-children.open{max-height:300px}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 10px 6px 36px;font-size:12px;color:rgba(255,255,255,.45);border-radius:7px;cursor:pointer;transition:all .15s;margin-bottom:1px}
.sb-item:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.sb-item.active{color:#93c5fd;background:rgba(59,130,246,.15);font-weight:500;border-left:2px solid rgba(147,197,253,.6);padding-left:8px}
.sb-single{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.sb-single:hover{background:rgba(255,255,255,.05)}
.sb-single.active{background:rgba(59,130,246,.2);border-left:2px solid rgba(147,197,253,.6);padding-left:8px}
.sb-single-icon{width:18px;height:18px;font-size:15px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sb-single-label{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.7)}
.sb-single.active .sb-single-label{color:#93c5fd}

.sb-bottom{padding:10px 14px;border-top:1px solid rgba(255,255,255,.06);margin-top:auto}
.sb-user{display:flex;align-items:center;gap:9px}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:rgba(59,130,246,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#93c5fd;flex-shrink:0}
.sb-user-email{font-size:11px;color:rgba(255,255,255,.4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-logout{margin-left:auto;font-size:11px;color:rgba(255,255,255,.25);cursor:pointer;padding:4px 8px;border-radius:5px;transition:all .15s}
.sb-logout:hover{color:#f87171;background:rgba(239,68,68,.1)}

/* ===== MAIN ===== */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left h1{font-size:15px;font-weight:600;color:var(--text)}
.topbar-left p{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{padding:20px 24px;flex:1}

/* ===== BOTONES ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:var(--white);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg);color:var(--text2)}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid #fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:7px;border-radius:8px}

/* ===== FILTROS ===== */
.toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-select{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12.5px;color:var(--text2);font-family:'Inter',sans-serif;cursor:pointer;outline:none}
.filter-select:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.filter-input{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12.5px;color:var(--text);font-family:'Inter',sans-serif;outline:none;width:180px}
.filter-input:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.filter-date{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12.5px;color:var(--text2);font-family:'Inter',sans-serif;cursor:pointer;outline:none}
.filter-date:focus{border-color:var(--blue2)}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text2);transition:all .15s}
.filter-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.filter-chip:hover:not(.active){background:var(--bg)}
.spacer{flex:1}

/* ===== CARDS ===== */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow)}
.card-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:6px}

/* ===== KPI CARDS ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow)}
.kpi-label{font-size:11.5px;color:var(--text3);font-weight:500;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;letter-spacing:-.5px;font-family:'JetBrains Mono',monospace}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:4px}
.kpi-badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:20px;font-size:10.5px;font-weight:600}
.kpi-up{background:var(--green-light);color:var(--green)}
.kpi-dn{background:var(--red-light);color:var(--red)}
.kpi-bar{height:3px;background:var(--border2);border-radius:99px;margin-top:8px;overflow:hidden}
.kpi-fill{height:100%;border-radius:99px;transition:width .6s ease}

/* ===== DASHBOARD GRID ===== */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.dash-grid-3{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}

/* ===== TABLA ===== */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:2px solid var(--border)}
thead th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border2);transition:background .1s}
tbody tr:hover{background:#fafbff}
tbody td{padding:11px 12px;font-size:13px;color:var(--text)}
tbody tr:last-child{border-bottom:none}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11.5px;font-weight:500}
.badge-ing{background:var(--green-light);color:var(--green)}
.badge-eg{background:var(--red-light);color:var(--red)}
.badge-cat{background:var(--blue-light);color:#1d4ed8}
.badge-med{background:var(--purple-light);color:var(--purple)}
.badge-comp-boleta{background:var(--green-light);color:var(--green)}
.badge-comp-factura{background:var(--blue-light);color:#1d4ed8}
.badge-comp-cotizacion{background:var(--yellow-light);color:var(--yellow)}

/* ===== AMOUNTS ===== */
.amount-ing{color:var(--green);font-weight:600;font-family:'JetBrains Mono',monospace}
.amount-eg{color:var(--red);font-weight:600;font-family:'JetBrains Mono',monospace}

/* ===== BARRA HORIZONTAL ===== */
.hbar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hbar-label{font-size:12px;color:var(--text2);min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbar-track{flex:1;height:6px;background:var(--border2);border-radius:99px;overflow:hidden}
.hbar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.hbar-val{font-size:12px;font-weight:600;color:var(--text);min-width:65px;text-align:right;font-family:'JetBrains Mono',monospace}

/* ===== CHART ===== */
.chart-wrap{position:relative;height:180px}
.chart-wrap-sm{position:relative;height:130px}

/* ===== MODAL ===== */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--white);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:500px;box-shadow:var(--shadow-md)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:18px;color:var(--text)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.tipo-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.tipo-btn{padding:10px;border-radius:9px;border:1.5px solid var(--border);background:var(--white);font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;color:var(--text2);transition:all .15s}
.tipo-btn.ai{border-color:var(--green);background:var(--green-light);color:var(--green)}
.tipo-btn.ae{border-color:var(--red);background:var(--red-light);color:var(--red)}

/* ===== FORM ===== */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:span 2}
label{font-size:11.5px;font-weight:500;color:var(--text2)}
input,select,textarea{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;width:100%;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.error-msg{background:var(--red-light);border:1px solid #fecaca;color:var(--red);padding:8px 12px;border-radius:8px;font-size:12.5px;margin-bottom:12px}

/* ===== DOCUMENTO IMPRESIÓN ===== */
@media print{body>*{display:none!important}#_printDoc{display:block!important;position:fixed;inset:0;background:#fff;z-index:99999;padding:20px}}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:2.5rem;margin-bottom:10px}
.empty p{font-size:13px}

/* ===== LOGIN ===== */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#eff6ff 0%,#f8fafc 50%,#f5f3ff 100%);padding:1rem}
.login-card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:400px;box-shadow:var(--shadow-md)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-mark{width:52px;height:52px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.login-logo-mark svg{width:30px;height:30px}
.login-logo h1{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.login-logo p{font-size:12.5px;color:var(--text3);margin-top:4px}
.login-form .form-group{margin-bottom:14px}
.login-btn{width:100%;margin-top:6px;justify-content:center;padding:10px}
.login-toggle{text-align:center;margin-top:14px;font-size:12.5px;color:var(--text3)}
.login-toggle span{color:var(--blue);cursor:pointer;font-weight:500}
.login-toggle span:hover{text-decoration:underline}

/* ===== TOOLTIP ===== */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}


.dark-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:background .15s}
.dark-btn:hover{background:var(--bg)}
.notif-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:background .15s}
.notif-btn:hover{background:var(--bg)}
.notif-badge{position:absolute;top:5px;right:5px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:2px solid var(--white)}
.notif-panel{position:fixed;top:56px;right:16px;width:300px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);z-index:150;overflow:hidden}
.notif-panel-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:space-between}
.notif-panel-close{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px}
.notif-panel-close:hover{background:var(--bg)}
.notif-item-p{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .1s}
.notif-item-p:hover{background:var(--bg)}
.notif-item-p:last-child{border-bottom:none}
.notif-ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.notif-ic.red{background:var(--red-light)}
.notif-ic.amber{background:var(--yellow-light)}
.notif-ic.blue{background:var(--blue-light)}
.notif-ic.green{background:var(--green-light)}
.notif-text{font-size:12px;color:var(--text);line-height:1.4}
.notif-time{font-size:10px;color:var(--text3);margin-top:2px}
.alert-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:12.5px}
.alert-banner.warn{background:#fffbeb;border:1px solid #fcd34d;color:#92400e}
.alert-banner.info{background:var(--blue-light);border:1px solid #bfdbfe;color:#1e3a5f}
body.dark .alert-banner.warn{background:#451a03;border-color:#78350f;color:#fcd34d}
body.dark .alert-banner.info{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd}
.alert-banner-link{margin-left:auto;font-weight:600;cursor:pointer;text-decoration:underline;white-space:nowrap}
.kpi-up{background:var(--green-light);color:var(--green)}
.kpi-dn{background:var(--red-light);color:var(--red)}
.kpi-neu{background:var(--border2);color:var(--text3)}
.kpi-badge{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:600}
.mini-stat{border-radius:9px;padding:11px 14px;text-align:center}
.mini-stat-label{font-size:11px;margin-bottom:3px}
.mini-stat-val{font-size:17px;font-weight:600;font-family:'JetBrains Mono',monospace}
.chat-panel{display:flex;flex-direction:column;height:380px}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.chat-bubble{max-width:85%;padding:9px 12px;border-radius:12px;font-size:12.5px;line-height:1.5}
.chat-bubble.user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.chat-bubble.ai{background:var(--white);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px}
.chat-bubble.loading{background:var(--white);border:1px solid var(--border);align-self:flex-start;color:var(--text3);font-style:italic}
.chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:var(--white)}
.chat-send{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif}
.chat-send:hover{background:#1d4ed8}
.cli-table-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border2);transition:background .1s;cursor:pointer}
.cli-table-row:last-child{border-bottom:none}
.cli-table-row:hover{background:var(--blue-light)}
.badge-vip{background:#fef3cd;color:#92400e}
.badge-frec{background:var(--green-light);color:var(--green)}
.badge-nuevo{background:var(--blue-light);color:#1d4ed8}
.badge-inac{background:var(--border2);color:var(--text3)}
.card-title-right{margin-left:auto;font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)}
.sb-badge-count{margin-left:auto;font-size:9.5px;font-weight:600;padding:1px 6px;border-radius:99px;color:#fff}
.sb-badge-count.red{background:#ef4444}
.sb-badge-count.amber{background:#f59e0b}
.item-row{display:grid;grid-template-columns:2fr 1.2fr 90px 28px;border-bottom:1px solid var(--border2);align-items:center}
.item-row:last-child{border-bottom:none}
.item-row input,.item-row select{border:none;border-radius:0;border-right:1px solid var(--border2);font-size:12.5px;padding:7px 8px;background:var(--white);color:var(--text)}
.item-row input:focus,.item-row select:focus{box-shadow:none;background:var(--primary-light)}
.item-row input:last-of-type{border-right:none}
tbody tr:hover{background:var(--blue-light)}

// Selector de hora amigable: genera dos <select> (horas y minutos)
function timeSelect(id, val='09:00'){
  const [hh,mm]=(val||'09:00').split(':');
  const horas=Array.from({length:16},(_,i)=>String(i+6).padStart(2,'0')); // 06-21
  const mins=['00','15','30','45'];
  const selStyle='padding:6px 8px;border:1px solid var(--border);border-radius:7px;background:var(--white);color:var(--text);font-size:13px;cursor:pointer;font-family:\'Inter\',sans-serif;flex:1';
  const hOpts=horas.map(h=>'<option value="'+h+'"'+(h===hh?' selected':'')+'>'+h+'</option>').join('');
  const mOpts=mins.map(m=>'<option value="'+m+'"'+(m===mm?' selected':'')+'>'+m+'</option>').join('');
  return '<div style="display:flex;align-items:center;gap:4px">'
    +'<select id="'+id+'_h" style="'+selStyle+'">'+hOpts+'</select>'
    +'<span style="font-size:16px;font-weight:700;color:var(--text2)">:</span>'
    +'<select id="'+id+'_m" style="'+selStyle+'">'+mOpts+'</select>'
    +'</div>';
}

function getCliTag(nombre){

  const hace90=new Date();hace90.setDate(hace90.getDate()-90);
  if(ult&&new Date(ult)<hace90) return 'inac';
  if(movs.length>=5) return 'vip';
  if(movs.length>=2) return 'frec';
  return 'nuevo';
}

function movsFiltrados(){
  return S.movimientos.filter(m=>{
    const okT=S.filtroTipo==='Todos'||m.tipo===S.filtroTipo;
    const okM=S.filtroMes==='todos'||(m.fecha&&m.fecha.startsWith(S.filtroMes));
    const okD=!S.filtroDia||m.fecha===S.filtroDia;
    const okC=S.filtroCategoria==='Todas'||m.categoria===S.filtroCategoria;
    const okB=!S.filtroBusqueda||[m.descripcion,m.categoria,m.cliente,m.medioPago].join(' ').toLowerCase().includes(S.filtroBusqueda.toLowerCase());
    return okT&&okM&&okD&&okC&&okB;
  });
}
function mesesDisp(){
  const ms=new Set(S.movimientos.map(m=>m.fecha?m.fecha.slice(0,7):'').filter(Boolean));

function todosMov(){
  return S.movimientos.filter(m=>(S.filtroMes==='todos'||(m.fecha&&m.fecha.startsWith(S.filtroMes)))&&(!S.filtroDia||m.fecha===S.filtroDia));
}
function calcKPIs(){
  const datos=movsFiltrados();
  const ing=datos.filter(m=>m.tipo==='Ingreso').reduce((s,m)=>s+m.monto,0);
  const eg=datos.filter(m=>m.tipo==='Egreso').reduce((s,m)=>s+m.monto,0);
  const neto=ing-eg;
  const total=datos.length;
  const ingresos=datos.filter(m=>m.tipo==='Ingreso');
  const ticket=ingresos.length?Math.round(ing/ingresos.length):0;
  return{ing,eg,neto,total,ticket};
}

async function cargarDatos(uid){
  // Determinar rol y ownerUid leyendo el perfil del usuario
  let ownerUid = uid; // por defecto admin usa su propio UID
  let rol = 'admin';
  try{
    const perfSnap = await get(ref(db,'userProfiles/'+uid));
    if(perfSnap.exists()){
      const perf = perfSnap.val();
      rol = perf.role || 'admin';
      ownerUid = perf.ownerUid || uid;
      S.nombre = perf.nombre || '';
    } else if(S._pendingRole){
      // Registro en curso: doRegister ya validó el código, usamos el rol pendiente
      rol = S._pendingRole;
      ownerUid = S._pendingOwner || uid;
      S._pendingRole = null; S._pendingOwner = null;
      await set(ref(db,'userProfiles/'+uid),{role:rol,ownerUid,email:S.user?.email||'',createdAt:new Date().toISOString()});
      if(rol==='admin') await set(ref(db,'config/ownerUid'),uid);
    } else {
      // Primera vez (admin): crear perfil
      await set(ref(db,'userProfiles/'+uid),{role:'admin',ownerUid:uid,email:S.user?.email||'',createdAt:new Date().toISOString()});
      await set(ref(db,'config/ownerUid'),uid);
    }
  }catch(e){}
  S.rol = rol;
  S.ownerUid = ownerUid;
  // Si es técnico, solo cargamos entregas del día
  if(rol==='tecnico'){
    onValue(ref(db,'users/'+ownerUid+'/entregas'),snap=>{
      const l=[]; snap.forEach(c=>{const v=c.val();if(v)l.push({id:c.key,...v});});
      // Solo entregas del día asignadas a este técnico
      S.entregas=l.filter(e=>e.tecnicoUid===uid||!e.tecnicoUid).sort((a,b)=>a.fechaEntrega>b.fechaEntrega?1:-1);
      S.seccion='entregas'; render();
    });
    return;
  }
  const p = ownerUid;
  onValue(ref(db,'users/'+p+'/movimientos'),snap=>{
    const l=[];
    snap.forEach(c=>{const v=c.val();if(v&&v.monto)l.push({id:c.key,...v});});
    l.sort((a,b)=>a.fecha<b.fecha?1:a.fecha>b.fecha?-1:a.createdAt<b.createdAt?1:-1);
    S.movimientos=l; _gInit=false; render();
  });
  onValue(ref(db,'users/'+p+'/clientes'),snap=>{
    const l=[]; snap.forEach(c=>{const v=c.val();if(v)l.push({id:c.key,...v});});
    S.clientes=l.sort((a,b)=>a.nombre>b.nombre?1:-1); render();
  });
  onValue(ref(db,'users/'+p+'/citas'),snap=>{
    const l=[]; snap.forEach(c=>{const v=c.val();if(v)l.push({id:c.key,...v});});
    S.citas=l.sort((a,b)=>a.fecha>b.fecha?1:a.fecha<b.fecha?-1:a.hora>b.hora?1:-1); render();
  });
  onValue(ref(db,'users/'+p+'/salidas'),snap=>{
    const l=[]; snap.forEach(c=>{const v=c.val();if(v)l.push({id:c.key,...v});});
    S.salidas=l.sort((a,b)=>a.createdAt<b.createdAt?1:-1); render();
  });
  onValue(ref(db,'users/'+p+'/inventario'),snap=>{
    const l=[]; snap.forEach(c=>{const v=c.val();if(v)l.push({id:c.key,...v});});
    S.inventario=l; render();
  });
  onValue(ref(db,'users/'+p+'/comprobantes'),snap=>{
    const l=[]; snap.forEach(c=>{const v=c.val();if(v)l.push({id:c.key,...v});});
    S.comprobantes=l.sort((a,b)=>a.emitidoEn<b.emitidoEn?1:-1); render();
  });
  onValue(ref(db,'users/'+p+'/entregas'),snap=>{
    const l=[]; snap.forEach(c=>{const v=c.val();if(v)l.push({id:c.key,...v});});
    S.entregas=l.sort((a,b)=>a.fechaEntrega>b.fechaEntrega?1:-1); render();
  });
  onValue(ref(db,'users/'+p+'/cotizaciones'),snap=>{
    const l=[]; snap.forEach(c=>{const v=c.val();if(v)l.push({id:c.key,...v});});
    S.cotizaciones=l.sort((a,b)=>a.createdAt<b.createdAt?1:-1); render();
  });
  onValue(ref(db,'users/'+p+'/team'),snap=>{
    const l=[]; snap.forEach(c=>{const v=c.val();if(v)l.push({id:c.key,...v});});
    S.team=l; render();
  });
  onValue(ref(db,'users/'+p+'/auditLog'),snap=>{
    const l=[]; snap.forEach(c=>{const v=c.val();if(v)l.push({id:c.key,...v});});
    S.auditLog=l.sort((a,b)=>a.ts<b.ts?1:-1).slice(0,200); render();
  });
}

window.doLogin = async()=>{
  const email=document.getElementById('le').value.trim(), pass=document.getElementById('lp').value;
  if(!email||!pass){S.error='Completa email y contraseña';render();return;}
  S.error='';S.loading=true;render();
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){S.error=tradErr(e.code);S.loading=false;render();}
};
window.doRegister = async()=>{
  const email=document.getElementById('le').value.trim(), pass=document.getElementById('lp').value,
        pass2=document.getElementById('lp2').value, cod=(document.getElementById('lcod')||{value:''}).value.trim().toUpperCase(),
        nombre=(document.getElementById('lnombre')||{value:''}).value.trim(),
        apellido=(document.getElementById('lapellido')||{value:''}).value.trim();
  if(!nombre||!apellido){S.error='Ingresa tu nombre y apellido';render();return;}
  if(!email||!pass||!pass2||!cod){S.error='Completa todos los campos';render();return;}
  if(pass!==pass2){S.error='Las contraseñas no coinciden';render();return;}
  if(pass.length<6){S.error='Mínimo 6 caracteres';render();return;}
  S.error='';S.loading=true;render();
  try{
    const anonCred=await signInAnonymously(auth);
    let roleAsignado=''; let ownerUid='';
    try{
      const [snapAdmin,snapVen,snapTec,snapOwner]=await Promise.all([
        get(ref(db,'config/inviteCode')),
        get(ref(db,'config/inviteVendedor')),
        get(ref(db,'config/inviteTecnico')),
        get(ref(db,'config/ownerUid')),
      ]);
      const cAdmin=(snapAdmin.val()||'').trim().toUpperCase();
      const cVen=(snapVen.val()||'').trim().toUpperCase();
      const cTec=(snapTec.val()||'').trim().toUpperCase();
      ownerUid=snapOwner.val()||'';
      if(cod===cAdmin) roleAsignado='admin';
      else if(cVen&&cod===cVen) roleAsignado='vendedor';
      else if(cTec&&cod===cTec) roleAsignado='tecnico';
    }finally{ await signOut(auth); }
    if(!roleAsignado){S.error='Código de invitación incorrecto';S.loading=false;render();return;}
    // Guardar rol ANTES de crear cuenta para que cargarDatos lo use cuando onAuthStateChanged dispare
    S._pendingRole = roleAsignado;
    S._pendingOwner = roleAsignado==='admin' ? null : ownerUid;
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    const newUid=cred.user.uid;
    const finalOwner=roleAsignado==='admin'?newUid:ownerUid;
    // Guardar perfil del usuario
    const nombreCompleto = nombre+' '+apellido;
    await set(ref(db,'userProfiles/'+newUid),{role:roleAsignado,ownerUid:finalOwner,email,nombre:nombreCompleto,createdAt:new Date().toISOString()});
    S.nombre = nombreCompleto;
    if(roleAsignado==='admin'){
      await set(ref(db,'config/ownerUid'),newUid);
    } else {
      // Registrar en el equipo del admin
      await set(ref(db,'users/'+finalOwner+'/team/'+newUid),{role:roleAsignado,email,nombre:nombreCompleto,createdAt:new Date().toISOString()});
    }
    auditoria('register','Nuevo usuario registrado: '+email+' ('+roleAsignado+')');
  }
  catch(e){
    if(e.code)S.error=tradErr(e.code);
    else if(!S.error)S.error='Error al registrar. Intenta nuevamente.';
    S.loading=false;render();
  }
};

// Movimientos
window.agregarMov = async()=>{
  ['m_fecha','m_cat','m_desc','m_monto','m_comp','m_medio',
   'm_cliente','m_ruc',
   'm_cli_dni','m_cli_tel','m_cli_email','m_cli_dir',
   'm_fechaEntrega','m_aCuenta','m_rucRazon'].forEach(id=>{
    const el=document.getElementById(id);if(el)S._fc[id]=el.value;
  });
  S._fc['m_horaEntrega']=getTime('m_horaEntrega');
  const c=S._fc;
  const fecha=c.m_fecha||'',comp=c.m_comp||'Boleta',
        medio=c.m_medio||'Yape',cliente=(c.m_cliente||'').trim(),
        ruc=(c.m_ruc||'').trim(),tipo=S.nuevoMov.tipo;
  // For ingreso: compute from items; for egreso: use single fields
  let desc,cat,monto;
  if(tipo==='Ingreso'&&S._items&&S._items.length>0){
    // Recalcular precio de cada item (cantidad * precioUnit) antes de guardar
    S._items.forEach(it=>{ if(it.precioUnit!==undefined){ it.precio=(parseFloat(it.cantidad||1)||1)*(parseFloat(it.precioUnit||0)||0); } });
    const validItems=S._items.filter(it=>it.desc&&parseFloat(it.precio||0)>0);
    desc=validItems.map(it=>it.desc).join(' + ')||(c.m_desc||'').trim();
    cat=validItems[0]?.cat||c.m_cat||'';
    monto=validItems.reduce((s,it)=>s+(parseFloat(it.precio)||0),0)||parseFloat(c.m_monto||0);
  } else {
    desc=(c.m_desc||'').trim();
    cat=c.m_cat||'';
    monto=parseFloat(c.m_monto||0);
  }
  if(!fecha){S.error='Falta la fecha';render();return;}
  if(!cat){S.error='Selecciona una categoría';render();return;}
  if(!desc){S.error='Agrega al menos un ítem con descripción';render();return;}
  if(isNaN(monto)||monto<=0){S.error='El monto total debe ser mayor a 0';render();return;}
  if(tipo==='Ingreso'&&!S.editMovId){
    const feVal=(c.m_fechaEntrega||'').trim();
    if(!feVal){S.error='La fecha de entrega es obligatoria';render();return;}
  }
  const mov={fecha,tipo,categoria:cat,descripcion:desc,monto,comprobante:comp,medioPago:medio,cliente,ruc,items:S._items?S._items.filter(it=>it.desc):undefined};
  try{
    if(S.editMovId){
      await update(ref(db,'users/'+S.ownerUid+'/movimientos/'+S.editMovId),mov);
      notif('✅ Movimiento actualizado');
      S.editMovId=null;
      S._fc={};S._items=[{desc:'',cat:'Cortinas',cantidad:'1',precioUnit:'',precio:''}];S.showModal=false;S.error='';render();return;
    }
    mov.createdAt=new Date().toISOString();
    await set(push(ref(db,'users/'+S.ownerUid+'/movimientos')),mov);
    // Auto-registrar cliente si tiene nombre y no existe aún
    if(cliente){
      const existe=S.clientes.find(x=>x.nombre.trim().toLowerCase()===cliente.toLowerCase());
      if(!existe){
        const nuevoCliente={
          nombre:cliente,
          dni:(c.m_cli_dni||'').trim(),
          telefono:(c.m_cli_tel||'').trim(),
          email:(c.m_cli_email||'').trim(),
          direccion:(c.m_cli_dir||'').trim(),
          ruc:(c.m_ruc||'').trim(),
          razonSocial:(c.m_rucRazon||'').trim(),
          createdAt:new Date().toISOString()
        };
        await set(push(ref(db,'users/'+S.ownerUid+'/clientes')),nuevoCliente);
        notif('✅ Movimiento guardado · Cliente "'+cliente+'" registrado');
      } else {
        notif('✅ Movimiento guardado');
      }
    } else {
      notif('✅ Movimiento guardado');
    }
    auditoria(S.editMovId?'edit_movimiento':'add_movimiento', tipo+' '+fmt(monto)+(cliente?' · '+cliente:''));
    // Auto-registrar entrega si hay fecha de entrega
    const fechaEntVal=(c.m_fechaEntrega||'').trim();
    const horaEntVal=(c.m_horaEntrega||'09:00').trim();
    const aCuentaVal=parseFloat(c.m_aCuenta||0);
    if(fechaEntVal&&tipo==='Ingreso'){
      const pendv=monto-aCuentaVal;
      const entData={cliente,descripcion:desc,fechaEntrega:fechaEntVal,horaEntrega:horaEntVal,monto,aCuenta:aCuentaVal,pendiente:Math.max(0,pendv),estado:pendv<=0?'Completada':'Pendiente',createdAt:new Date().toISOString()};
      set(push(ref(db,'users/'+S.ownerUid+'/entregas')),entData).catch(()=>{});
    }
    S._fc={};S._items=[{desc:'',cat:'Cortinas',cantidad:'1',precioUnit:'',precio:''}];S.showModal=false;
    S.nuevoMov={fecha:hoy(),tipo:'Ingreso',categoria:'',descripcion:'',monto:'',comprobante:'Boleta',medioPago:'Yape',cliente:'',notas:''};
    S.error='';render();
  }catch(e){S.error='Error al guardar';render();}
};

  const m=S.movimientos.find(x=>x.id===id);if(!m)return;
  S.editMovId=id;

  S._fc={
    m_fecha:m.fecha, m_medio:m.medioPago||'Yape', m_comp:m.comprobante||'Boleta',
    m_cliente:m.cliente||'', m_desc:m.descripcion||'', m_cat:m.categoria||'',
    m_monto:String(m.monto||''), m_notas:m.notas||'',
    m_fechaEntrega:'', m_horaEntrega:'', m_aCuenta:''
  };
  if(m.items&&m.items.length>0) S._items=m.items.map(it=>({...it, cantidad:it.cantidad||'1', precioUnit:it.precioUnit||String(it.precio||'')}));
  else S._items=[{desc:m.descripcion||'',cat:m.categoria||CATS_ING[0],cantidad:'1',precioUnit:String(m.monto||''),precio:String(m.monto||'')}];
  S.showModal=true; S.modalTipo='movimiento'; S.error=''; render();
};

window.registrarSalidaById = (id)=>{
  const p=S.inventario.find(x=>x.id===id);if(!p)return;
  const ov=document.createElement('div');
  ov.className='modal-backdrop';ov.id='_salidaModal';
  ov.innerHTML='<div class="modal" style="max-width:380px">'
    +'<h2 style="margin-bottom:6px">📤 Registrar salida</h2>'
    +'<p style="font-size:13px;color:var(--text3);margin-bottom:16px">'+p.nombre+'</p>'
    +'<div style="background:var(--bg);border-radius:9px;padding:10px 14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:6px">'
    +'<div style="font-size:12px;color:var(--text3)">Stock actual</div>'
    +'<div style="font-size:14px;font-weight:600;color:var(--text);font-family:JetBrains Mono,monospace">'+p.stock+' '+(p.unidad||'und')+'</div>'
    +'<div style="font-size:12px;color:var(--text3)">Stock mínimo</div>'
    +'<div style="font-size:14px;font-weight:600;color:'+(p.stock<=p.stockMin?'var(--red)':'var(--text3)')+';font-family:JetBrains Mono,monospace">'+p.stockMin+' '+(p.unidad||'und')+'</div>'
    +'</div>'
    +'<div class="form-group" style="margin-bottom:16px">'
    +'<label>Cantidad que sale</label>'
    +'<input type="number" id="_salidaCant" min="0.1" step="0.1" max="'+p.stock+'" placeholder="Ej: 5" style="font-size:16px;text-align:center" autofocus>'
    +'</div>'
    +'<div id="_salidaError" style="display:none;color:var(--red);font-size:12.5px;margin-bottom:10px"></div>'
    +'<div class="modal-footer">'
    +'<button class="btn btn-ghost" id="_salidaCancelar">Cancelar</button>'
    +'<button class="btn btn-primary" id="_salidaConfirm">✅ Confirmar salida</button>'
    +'</div></div>';
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.getElementById('_salidaCancelar').addEventListener('click',()=>ov.remove());
  const inp=document.getElementById('_salidaCant');
  inp.focus();
  document.getElementById('_salidaConfirm').addEventListener('click',async()=>{
    const cant=parseFloat(inp.value);
    const errEl=document.getElementById('_salidaError');
    if(isNaN(cant)||cant<=0){errEl.textContent='Ingresa una cantidad válida';errEl.style.display='block';return;}
    if(cant>p.stock){errEl.textContent='No hay suficiente stock (máx: '+p.stock+')';errEl.style.display='block';return;}
    const nuevoStock=Math.round((p.stock-cant)*100)/100;
    ov.remove();
    try{
      await update(ref(db,'users/'+S.ownerUid+'/inventario/'+id),{stock:nuevoStock});
      const salida={
        productoId:id, nombre:p.nombre,
        cantidad:cant, stockAntes:p.stock, stockDespues:nuevoStock,
        fecha:new Date().toISOString().slice(0,10),
        hora:new Date().toTimeString().slice(0,5),
        createdAt:new Date().toISOString()
      };
      await set(push(ref(db,'users/'+S.ownerUid+'/salidas')),salida);
      notif('✅ Salida registrada. Stock nuevo: '+nuevoStock);
    }catch(e){notif('Error al registrar salida');}
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('_salidaConfirm').click();});
};

window.editarSalida = (id)=>{
  const s=S.salidas.find(x=>x.id===id); if(!s) return;
  const ov=document.createElement('div');
  ov.className='modal-backdrop'; ov.id='_editSalidaModal';
  ov.innerHTML='<div class="modal" style="max-width:380px">'
    +'<h2 style="margin-bottom:6px">✏️ Editar salida</h2>'
    +'<p style="font-size:13px;color:var(--text3);margin-bottom:16px">'+s.nombre+'</p>'
    +'<div class="form-grid">'
    +'<div class="form-group"><label>Fecha</label><input type="date" id="_esFecha" value="'+s.fecha+'"></div>'
    +'<div class="form-group"><label>Hora</label>'+timeSelect('_esHora',s.hora||'09:00')+'</div>'
    +'<div class="form-group full"><label>Cantidad salida</label><input type="number" id="_esCant" min="0.1" step="0.1" value="'+s.cantidad+'" style="font-size:16px;text-align:center"></div>'
    +'</div>'
    +'<div id="_esError" style="display:none;color:var(--red);font-size:12.5px;margin:8px 0"></div>'
    +'<div class="modal-footer">'
    +'<button class="btn btn-ghost" id="_esCancelar">Cancelar</button>'
    +'<button class="btn btn-primary" id="_esGuardar">💾 Guardar cambios</button>'
    +'</div></div>';
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
  document.getElementById('_esCancelar').addEventListener('click',()=>ov.remove());
  document.getElementById('_esGuardar').addEventListener('click',async()=>{
    const cant=parseFloat(document.getElementById('_esCant').value);
    const fecha=document.getElementById('_esFecha').value;
    const hora=getTime('_esHora');
    const errEl=document.getElementById('_esError');
    if(isNaN(cant)||cant<=0){ errEl.textContent='Cantidad inválida'; errEl.style.display='block'; return; }
    if(!fecha){ errEl.textContent='Falta la fecha'; errEl.style.display='block'; return; }
    const nuevoStockDespues=Math.round((s.stockAntes-cant)*100)/100;
    ov.remove();
    try{
      await update(ref(db,'users/'+S.ownerUid+'/salidas/'+id),{
        cantidad:cant, fecha, hora,
        stockDespues:nuevoStockDespues,
        editadoEn:new Date().toISOString()
      });
      notif('✅ Salida actualizada');
    }catch(e){ notif('Error al guardar'); }
  });
};

window.editarProducto = (id)=>{
  const p=S.inventario.find(x=>x.id===id); if(!p) return;
  const CATS_INV=['Telas','Rieles','Accesorios','Cortinas','Rollers','Stores','Otros'];
  const ov=document.createElement('div');
  ov.className='modal-backdrop'; ov.id='_editProdModal';
  ov.innerHTML='<div class="modal" style="max-width:420px">'
    +'<h2 style="margin-bottom:6px">✏️ Editar producto</h2>'
    +'<p style="font-size:13px;color:var(--text3);margin-bottom:16px">'+p.nombre+'</p>'
    +'<div class="form-grid">'
    +'<div class="form-group full"><label>Nombre</label><input type="text" id="_epNombre" value="'+p.nombre+'"></div>'
    +'<div class="form-group"><label>Categoría</label><select id="_epCat">'+CATS_INV.map(c=>`<option value="${c}"${p.categoria===c?' selected':''}>${c}</option>`).join('')+'</select></div>'
    +'<div class="form-group"><label>Unidad</label><input type="text" id="_epUnidad" value="'+(p.unidad||'und')+'"></div>'
    +'<div class="form-group"><label>Stock actual</label><input type="number" id="_epStock" min="0" step="0.1" value="'+(p.stock||0)+'"></div>'
    +'<div class="form-group"><label>Stock mínimo</label><input type="number" id="_epStockMin" min="0" step="0.1" value="'+(p.stockMin||5)+'"></div>'
    +'<div class="form-group"><label>Precio unitario (S/.)</label><input type="number" id="_epPrecio" min="0" step="0.01" value="'+(p.precio||0)+'"></div>'
    +'</div>'
    +'<div id="_epError" style="display:none;color:var(--red);font-size:12.5px;margin:8px 0"></div>'
    +'<div class="modal-footer">'
    +'<button class="btn btn-ghost" id="_epCancelar">Cancelar</button>'
    +'<button class="btn btn-primary" id="_epGuardar">💾 Guardar cambios</button>'
    +'</div></div>';
  document.body.appendChild(ov);
  ov.addEventListener('click',ev=>{ if(ev.target===ov) ov.remove(); });
  document.getElementById('_epCancelar').addEventListener('click',()=>ov.remove());
  document.getElementById('_epGuardar').addEventListener('click',async()=>{
    const nombre=(document.getElementById('_epNombre').value||'').trim();
    const categoria=document.getElementById('_epCat').value;
    const unidad=(document.getElementById('_epUnidad').value||'und').trim();
    const stock=parseFloat(document.getElementById('_epStock').value||0);
    const stockMin=parseFloat(document.getElementById('_epStockMin').value||0);
    const precio=parseFloat(document.getElementById('_epPrecio').value||0);
    const errEl=document.getElementById('_epError');
    if(!nombre){ errEl.textContent='El nombre es obligatorio'; errEl.style.display='block'; return; }
    ov.remove();
    try{
      await update(ref(db,'users/'+S.ownerUid+'/inventario/'+id),{
        nombre,categoria,unidad,stock,stockMin,precio,editadoEn:new Date().toISOString()
      });
      notif('✅ Producto actualizado');
    }catch(err){ notif('Error al guardar'); }
  });
};
window.agregarProducto = async()=>{
  ['p_nombre','p_cat','p_stock','p_stockmin','p_precio','p_unidad'].forEach(id=>{
    const el=document.getElementById(id);if(el)S._fc[id]=el.value;
  });
  const c=S._fc;
  const prod={nombre:(c.p_nombre||'').trim(),categoria:(c.p_cat||'').trim(),stock:parseFloat(c.p_stock||0),stockMin:parseFloat(c.p_stockmin||5),precio:parseFloat(c.p_precio||0),unidad:(c.p_unidad||'und').trim(),createdAt:new Date().toISOString()};
  if(!prod.nombre){S.error='Falta el nombre del producto';render();return;}
  try{
    await set(push(ref(db,'users/'+S.ownerUid+'/inventario')),prod);
    S._fc={};S.showModal=false;S.error='';notif('✅ Producto guardado');render();
  }catch(e){S.error='Error al guardar';render();}
};

window.filtrarCajaDOM = function(v){
  S.filtroBusqueda=v;

  const tbody=document.getElementById('caja-tbody');

  tbody.querySelectorAll('tr').forEach(tr=>{
    tr.style.display=!q||tr.dataset.busq.includes(q)?'':'none';
  });
};

window.filtrarClientesDOM = function(v){
  S.filtroCliBusq=v;
  const q=v.trim().toLowerCase();
  const grid=document.getElementById('cli-grid');
  const empty=document.getElementById('cli-empty');
  if(!grid)return;
  const cards=grid.querySelectorAll('.cliente-card');
  let visible=0;
  cards.forEach(card=>{
    const match=!q||card.dataset.nombre.includes(q)||card.dataset.telefono.includes(q)||card.dataset.email.includes(q);
    card.style.display=match?'':'none';
    if(match)visible++;
  });
  if(empty){empty.style.display=visible===0?'block':'none';}
};

window.exportarPDF = ()=>{
  const datos=movsFiltrados();if(!datos.length){notif('Sin datos');return;}
  const {ing,eg,neto}=calcKPIs();
  const fecha=new Date().toLocaleDateString('es-PE');
  const filas=datos.map(m=>[
    '<tr><td>',m.fecha,'</td><td>',m.tipo,'</td><td>',m.categoria,'</td><td>',
    m.descripcion,'</td><td>',m.cliente||'—','</td><td>',m.medioPago||'—',
    '</td><td class="',m.tipo==='Ingreso'?'ing':'eg','" style="text-align:right">',
    m.tipo==='Ingreso'?'+':'−','S/.',parseFloat(m.monto).toFixed(2),'</td></tr>'
  ].join('')).join('');
  const doc=[
    '<!DOCTYPE html><html><head><meta charset="UTF-8">',
    '<style>body{font-family:Arial;padding:24px;color:#1e293b;font-size:12px}',
    'h1{font-size:18px;margin-bottom:4px}p{color:#64748b;margin-bottom:16px}',
    'table{width:100%;border-collapse:collapse}',
    'th{background:#0f172a;color:#fff;padding:8px 10px;text-align:left;font-size:11px}',
    'td{padding:7px 10px;border-bottom:1px solid #f1f5f9;font-size:12px}',
    '.ing{color:#059669;font-weight:700}.eg{color:#dc2626;font-weight:700}',
    '.tot{margin-top:16px;text-align:right;font-size:13px}',
    '@media print{body{padding:12px}}</style></head><body>',
    '<h1>Sesko — Reporte de movimientos</h1>',
    '<p>Generado el ',fecha,' · ',datos.length,' movimientos</p>',
    '<table><thead><tr>',
    '<th>Fecha</th><th>Tipo</th><th>Categoría</th><th>Descripción</th>',
    '<th>Cliente</th><th>Medio</th><th style="text-align:right">Monto</th>',
    '</tr></thead><tbody>',filas,'</tbody></table>',
    '<div class="tot"><b>Ingresos: S/.',ing.toFixed(2),'</b>',
    ' | Egresos: S/.',eg.toFixed(2),
    ' | <b>Neto: S/.',neto.toFixed(2),'</b></div>',
    '<scr'+'ipt>window.onload=function(){window.print()}<'+'/scr'+'ipt>',
    '</body></html>'
  ].join('');
  const blob=new Blob([doc],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='Sesko_reporte.html';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),3000);notif('📄 PDF descargado');
};

};

  let ac=0;const acd=[...datos].sort((a,b)=>a.fecha>b.fecha?1:-1).map(m=>{ac+=m.tipo==='Ingreso'?m.monto:-m.monto;return{l:m.fecha.slice(5),v:ac};});

  const meses6=mesesDisp().slice(0,6).reverse();
  const cd6=meses6.map(mes=>({l:mes.slice(5)+'/'+mes.slice(2,4),i:S.movimientos.filter(m=>m.tipo==='Ingreso'&&m.fecha&&m.fecha.startsWith(mes)).reduce((s,m)=>s+m.monto,0),e:S.movimientos.filter(m=>m.tipo==='Egreso'&&m.fecha&&m.fecha.startsWith(mes)).reduce((s,m)=>s+m.monto,0)}));
  destroy('comp');const c6=document.getElementById('cComp');
  if(c6)S.charts.comp=new Chart(c6,{type:'bar',data:{labels:cd6.map(d=>d.l),datasets:[
    {label:'Ingresos',data:cd6.map(d=>d.i),backgroundColor:'rgba(16,185,129,0.7)',borderRadius:4,borderSkipped:false},
    {label:'Egresos',data:cd6.map(d=>d.e),backgroundColor:'rgba(239,68,68,0.7)',borderRadius:4,borderSkipped:false}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'S/.'+ctx.raw.toLocaleString('es-PE')}}},scales:{...sc,x:{...sc.x,ticks:{...sc.x.ticks,autoSkip:false,maxRotation:0}}}}});

  const diasN=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'],diasD=Array(7).fill(0);
  datosFijos.filter(m=>m.tipo==='Ingreso').forEach(m=>{const d=new Date(m.fecha+'T12:00:00');diasD[(d.getDay()+6)%7]+=m.monto;});
  const maxD=Math.max(...diasD,1);
  const hm=document.getElementById('heatmap');
  if(hm){hm.innerHTML='';diasN.forEach((n,i)=>{
    const ci=Math.min(4,Math.floor((diasD[i]/maxD)*5));
    const colors=['#f8fafc','#dbeafe','#93c5fd','#3b82f6','#1d4ed8'];
    const textColors=['#94a3b8','#1d4ed8','#1d4ed8','#fff','#fff'];
    const val=diasD[i]>=1000?'S/.'+Math.round(diasD[i]/100)/10+'k':diasD[i]>0?'S/.'+diasD[i].toFixed(0):'—';
    const cell=document.createElement('div');
    cell.style.cssText='background:'+colors[ci]+';border:1px solid #e2e8f0;border-radius:8px;padding:8px 4px;text-align:center';

    hm.appendChild(cell);
  });}
}

    numero:'COT-'+num, estado:'Borrador',
    margen:total>0?Math.round(((total-costoTotal)/total)*100):0,
    createdAt:new Date().toISOString()

}
function saveMovFields(){
  ['m_cliente','m_cli_tel','m_cli_dir','m_fecha','m_medio','m_comp',
   'm_fechaEntrega','m_aCuenta','m_monto','m_desc','m_cat'].forEach(id=>{

  });

window.addItem = ()=>{
  if(S.modalTipo==='cotizacion') saveCotFields(); else saveMovFields();
  if(S.modalTipo==='cotizacion') S._items.push({desc:'',cat:CATS_ING[0],precio:'',costo:''});
  else S._items.push({desc:'',cat:CATS_ING[0],cantidad:'1',precioUnit:'',precio:''});
  render();
  setTimeout(attachModalListeners,30);
};
window.removeItem = (i)=>{
  if(S._items.length<=1)return;
  if(S.modalTipo==='cotizacion') saveCotFields(); else saveMovFields();
  S._items.splice(i,1);
  render();
  setTimeout(attachModalListeners,30);
};
window.updateItem = (i,field,val)=>{
  if(!S._items[i])return;
  S._items[i][field]=val;
  // Para modal de movimiento: precio = cantidad * precioUnit
  if(S.modalTipo==='movimiento'){
    const it=S._items[i];
    const cant=parseFloat(it.cantidad||1)||1;
    const unit=parseFloat(it.precioUnit||0)||0;
    S._items[i].precio=cant*unit;
  }
  // Actualizar total en tiempo real sin re-render
  const tot=S._items.reduce((s,it)=>s+(parseFloat(it.precio)||0),0);
  const cos=S._items.reduce((s,it)=>s+(parseFloat(it.costo)||0),0);
  const mar=tot>0?Math.round(((tot-cos)/tot)*100):0;
  const marCol=mar>=50?'var(--green)':mar>=25?'var(--yellow)':'var(--red)';
  // Movimiento modal
  const disp=document.getElementById('m_total_display');
  if(disp)disp.textContent=fmt(tot);
  calcSaldo();
  // Cotización modal
  const cotTot=document.getElementById('cot_total_display');
  if(cotTot)cotTot.textContent=fmt(tot);
  const cotMar=document.getElementById('cot_margen_display');
  if(cotMar){
    if(cos>0){cotMar.textContent='Margen: '+mar+'% · Costo: '+fmt(cos);cotMar.style.color=marCol;}
    else{cotMar.textContent='Ingresa el costo para ver el margen';cotMar.style.color='var(--text3)';}
  }
};

window.buscarRucModal = async()=>{

window.attachModalListeners = ()=>{
  const acuenta=document.getElementById('m_aCuenta');
  const saldo=document.getElementById('m_saldo');
  if(!acuenta||!saldo)return;
  const getTotal=()=>{
    if(S.modalTipo==='movimiento'){
      // Leer cantidad y precioUnit de los inputs actuales del DOM
      let tot=0;
      S._items.forEach((_,i)=>{
        const cantEl=document.querySelector('#irow'+i+' input[data-field="cantidad"]');
        const unitEl=document.querySelector('#irow'+i+' input[data-field="precioUnit"]');
        const cant=parseFloat(cantEl?cantEl.value:(S._items[i].cantidad||1))||1;
        const unit=parseFloat(unitEl?unitEl.value:(S._items[i].precioUnit||0))||0;
        tot+=cant*unit;
      });
      return tot;
    }
    // cotizacion: sumar .item-price
    let tot=0;
    document.querySelectorAll('.item-price').forEach(p=>tot+=parseFloat(p.value||0));
    return tot;
  };
  const update=()=>{
    const tot=getTotal();
    const a=parseFloat(acuenta.value||0);
    const disp=document.getElementById('m_total_display');
    if(disp)disp.textContent=fmt(tot);
    saldo.textContent='S/.'+(Math.max(0,tot-a)).toFixed(2);
  };
  acuenta.addEventListener('input',update);
  document.querySelectorAll('.item-price').forEach(p=>p.addEventListener('input',update));
  update();
};

window.sendChatMsg = async(preguntaDirecta)=>{
  const inp=document.getElementById('chat-input');

  if(!q)return;

  let apiKey=localStorage.getItem('seskoApiKey')?atob(localStorage.getItem('seskoApiKey')):'';
  if(!apiKey){
    apiKey=prompt('🔑 Para usar el Chat con IA necesitas tu API key de Anthropic.\n\nObtén una gratis en: console.anthropic.com\n\nPega tu API key aquí (empieza con sk-ant-...):\n\n⚠ IMPORTANTE: Solo ingresa tu key en dispositivos de confianza. No la compartas con nadie.');

  }

  if(inp)inp.value='';
  S.chatMessages.push({role:'user',text:q});
  S.chatLoading=true;render();

  // ===== CONTEXTO COMPLETO DEL NEGOCIO =====
  const _n=new Date();
  const _mA=_n.toISOString().slice(0,7);
  const _mP=new Date(_n.getFullYear(),_n.getMonth()-1,1).toISOString().slice(0,7);
  const _hoy=_n.toISOString().slice(0,10);
  const _ingA=S.movimientos.filter(m=>m.fecha?.startsWith(_mA)&&m.tipo==='Ingreso').reduce((s,m)=>s+(m.monto||0),0);
  const _egA=S.movimientos.filter(m=>m.fecha?.startsWith(_mA)&&m.tipo==='Egreso').reduce((s,m)=>s+(m.monto||0),0);
  const _ingP=S.movimientos.filter(m=>m.fecha?.startsWith(_mP)&&m.tipo==='Ingreso').reduce((s,m)=>s+(m.monto||0),0);
  const _egP=S.movimientos.filter(m=>m.fecha?.startsWith(_mP)&&m.tipo==='Egreso').reduce((s,m)=>s+(m.monto||0),0);
  const _varI=_ingP>0?Math.round((_ingA-_ingP)/_ingP*100):null;
  // Márgenes por categoría
  const _cd={};
  S.movimientos.filter(m=>m.tipo==='Ingreso').forEach(m=>{const c=m.categoria||'Otros';if(!_cd[c])_cd[c]={i:0,c:0,n:0};_cd[c].i+=m.monto||0;_cd[c].c+=m.costo||0;_cd[c].n++;});
  const _margs=Object.entries(_cd).map(([c,v])=>c+'='+(v.i>0?Math.round((v.i-v.c)/v.i*100):0)+'% ('+fmt(v.i)+', '+v.n+' ventas)').join(' | ');
  // Clientes inactivos 90+ días
  const _clU={};
  S.movimientos.filter(m=>m.tipo==='Ingreso'&&m.cliente).forEach(m=>{const c=m.cliente.trim();if(!_clU[c]||m.fecha>_clU[c])_clU[c]=m.fecha;});
  const _i90=Object.entries(_clU).filter(([c,d])=>((_n-new Date(d))/86400000)>=90).map(([c,d])=>c+'('+Math.round((_n-new Date(d))/86400000)+' días)').join(', ');
  // Predicción semana (promedio 4 sem)
  const _sw=[];for(let w=1;w<=4;w++){const i=new Date(_n.getTime()-w*7*86400000).toISOString().slice(0,10);const f=new Date(_n.getTime()-(w-1)*7*86400000).toISOString().slice(0,10);_sw.push(S.movimientos.filter(m=>m.tipo==='Ingreso'&&m.fecha>=i&&m.fecha<f).reduce((s,m)=>s+(m.monto||0),0));}
  const _pred=_sw.filter(v=>v>0).length?Math.round(_sw.reduce((s,v)=>s+v,0)/_sw.filter(v=>v>0).length):0;
  // Cobros pendientes
  const _cobP=S.entregas.filter(e=>e.estado!=='Completada'&&(e.pendiente||0)>0).reduce((s,e)=>s+(e.pendiente||0),0);
  // Cotizaciones
  const _cotP=S.cotizaciones.filter(c=>c.estado==='pendiente'||c.estado==='aprobada');
  // Top clientes
  const _topCli=Object.entries(S.movimientos.filter(m=>m.tipo==='Ingreso'&&m.cliente).reduce((a,m)=>{a[m.cliente]=(a[m.cliente]||0)+(m.monto||0);return a},{})).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([c,v])=>c+': '+fmt(v)).join(', ');
  // Últimos movimientos
  const _ults=S.movimientos.slice(0,20).map(m=>(m.fecha||'')+' '+m.tipo+' '+fmt(m.monto||0)+' '+( m.categoria||'')+' '+(m.cliente||'')+' '+(m.descripcion||'')).join('\n');

  const _ctx='=== NEGOCIO: '+(S.config?.nombre||'S&D')+' | HOY: '+_hoy+' ===\n'
    +'MES ACTUAL ('+_mA+'): Ingresos '+fmt(_ingA)+', Egresos '+fmt(_egA)+', Neto '+fmt(_ingA-_egA)+', '+S.movimientos.filter(m=>m.fecha?.startsWith(_mA)).length+' movimientos\n'
    +'MES ANTERIOR ('+_mP+'): Ingresos '+fmt(_ingP)+', Egresos '+fmt(_egP)+', Neto '+fmt(_ingP-_egP)+'\n'
    +(_varI!==null?'VARIACIÓN INGRESOS: '+(_varI>0?'+':'')+_varI+'% vs mes anterior\n':'')
    +'MÁRGENES POR CATEGORÍA: '+(_margs||'sin datos de costo aún')+'\n'
    +'CLIENTES INACTIVOS +90 DÍAS: '+(_i90||'ninguno')+'\n'
    +'PREDICCIÓN PRÓXIMA SEMANA (prom 4 sem): '+fmt(_pred)+'\n'
    +'COBROS PENDIENTES EN ENTREGAS: '+fmt(_cobP)+'\n'
    +'COTIZACIONES PENDIENTES: '+_cotP.length+' por '+fmt(_cotP.reduce((s,c)=>s+(c.total||0),0))+'\n'
    +'TOP CLIENTES (total histórico): '+(_topCli||'sin datos')+'\n'
    +'STOCK BAJO: '+(S.inventario.filter(p=>p.stock<=p.stockMin).map(p=>p.nombre+' ('+p.stock+' uds)').join(', ')||'ninguno')+'\n'
    +'CLIENTES REGISTRADOS: '+S.clientes.length+'\n'
    +'--- ÚLTIMOS 20 MOVIMIENTOS ---\n'+_ults;

  // Historial de conversación (últimas 5 exchanges)
  const _hist=S.chatMessages.slice(-10,-1).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}));

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:700,
        system:'Eres Sesko IA, el analista de datos personal de '+(S.config?.nombre||'este negocio')+', una MYPE peruana.\n'
          +'Tienes acceso a los datos reales del negocio en tiempo real. Responde SIEMPRE en español.\n'
          +'Sé analítico: no solo cites el dato, interpreta qué significa y qué acción concreta tomar.\n'
          +'Usa S/. para soles. Usa emojis para puntos clave. Máximo 6 líneas por respuesta.\n'
          +'Si no tienes el dato exacto, dilo y da lo que sí puedes calcular.\n\n'
          +'DATOS DEL NEGOCIO:\n'+_ctx,
        messages:[..._hist,{role:'user',content:q}]
      })
    });
    const d=await r.json();
    if(d.error){
      if(d.error.type==='authentication_error'){localStorage.removeItem('seskoApiKey');S.chatMessages.push({role:'ai',text:'❌ API key inválida o expirada. Se eliminó. Intenta de nuevo.'});}
      else S.chatMessages.push({role:'ai',text:'❌ Error: '+d.error.message});
    } else {
      S.chatMessages.push({role:'ai',text:d.content?.[0]?.text||'Sin respuesta.'});
    }
  }catch(e){
    S.chatMessages.push({role:'ai',text:'❌ Error de conexión. Verifica tu internet.'});
  }
  S.chatLoading=false;render();
  setTimeout(()=>{const el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
};

  renderApp();

};

function attachInventarioListeners(){
  // Botones de inventario (productos)
  document.querySelectorAll('[data-stock-id]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=btn.getAttribute('data-stock-id');
      const p=S.inventario.find(x=>x.id===id);if(!p)return;
      const cant=parseInt(prompt(`Agregar stock a "${p.nombre}" (actual: ${p.stock} ${p.unidad||'und'})\n¿Cuántas unidades añadir?`)||'0');
      if(isNaN(cant)||cant<=0)return;
      update(ref(db,'users/'+S.ownerUid+'/inventario/'+id),{stock:p.stock+cant}).then(()=>notif(`✅ +${cant} unidades agregadas`));
    });

          <div class="form-group"><label>Unidad</label><input type="text" id="p_unidad" placeholder="und, mt, kg..." value="${S._fc['p_unidad']||'und'}"></div>
          <div class="form-group"><label>Stock actual</label><input type="number" id="p_stock" placeholder="0" min="0" step="0.1" value="${S._fc['p_stock']||'0'}"></div>
          <div class="form-group"><label>Stock mínimo</label><input type="number" id="p_stockmin" placeholder="5" min="0" step="0.1" value="${S._fc['p_stockmin']||'5'}"></div>
          <div class="form-group"><label>Precio (S/.)</label><input type="number" id="p_precio" placeholder="0.00" min="0" step="0.01" value="${S._fc['p_precio']||'0'}"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="agregarProducto()">💾 Guardar</button>
        </div>
      </div></div>`;
    }
  }

  document.getElementById('app').innerHTML=`
  <div class="layout">
    <nav class="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <div>
          <div class="sb-logo-name">Sesko</div>
          <div class="sb-logo-sub">S&D Decoraciones</div>
        </div>
      </div>
      <div class="sb-nav">${sbHtml}</div>
      <div class="sb-bottom">
        <div class="sb-user">
          <div class="sb-avatar">${S.user?.email?.[0]?.toUpperCase()||'?'}</div>
          <div style="flex:1;min-width:0">
            <div class="sb-user-email">${S.user?.email||''}</div>
            <div style="font-size:9px;margin-top:2px;padding:1px 6px;border-radius:99px;display:inline-block;${S.rol==='admin'?'background:rgba(59,130,246,.25);color:#93c5fd':S.rol==='vendedor'?'background:rgba(16,185,129,.2);color:#6ee7b7':'background:rgba(251,191,36,.2);color:#fcd34d'}">${S.rol==='admin'?'Admin':S.rol==='vendedor'?'Vendedor':'Técnico'}</div>
          </div>
          <div class="sb-logout" onclick="doLogout()">Salir</div>
        </div>
      </div>
    </nav>
    <div class="main">
      <div class="topbar">
        <div class="topbar-left">
          <h1>${topbarTitle}</h1>
          <p>${topbarSub}</p>
        </div>
        <div class="topbar-right">
          ${S.seccion==='dashboard'?`<select class="filter-select" style="font-size:12px;padding:4px 8px;border-radius:7px;height:30px" onchange="setMes(this.value)"><option value="todos" ${S.filtroMes==='todos'?'selected':''}>Todo el año</option>${meses.map(m=>`<option value="${m}" ${S.filtroMes===m?'selected':''}>${MESES[parseInt(m.slice(5))-1]} ${m.slice(0,4)}</option>`).join('')}</select>`:''}
          <div class="dark-btn" onclick="toggleDark()" title="Modo oscuro/claro">${S.darkMode?'☀️':'🌙'}</div>
          <div class="notif-btn" onclick="toggleNotifPanel()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            ${getNotificaciones().length>0?'<div class="notif-badge"></div>':''}
          </div>
          <button class="btn btn-primary btn-sm" onclick="openModal('movimiento')">+ Nuevo movimiento</button>
        </div>
      </div>
      ${S.showNotifPanel?`<div style="position:fixed;inset:0;z-index:149" onclick="closeNotifPanel()"></div><div class="notif-panel">
        <div class="notif-panel-header">Notificaciones <span class="notif-panel-close" onclick="closeNotifPanel()">✕</span></div>
        ${(()=>{const ns=getNotificaciones();return ns.length===0?'<div style="padding:16px;text-align:center;font-size:12px;color:var(--text3)">Sin notificaciones</div>':ns.map(n=>`<div class="notif-item-p" onclick="event.stopPropagation();ir('${n.link}','${n.sub}');closeNotifPanel()"><div class="notif-ic ${n.tipo}">${n.ic}</div><div><div class="notif-text">${n.texto}</div></div></div>`).join('');})()}
      </div>`:''}
      ${toolbarHtml}
      <div class="content">${contenido}</div>
    </div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
  // Inject modal separately to avoid template literal nesting issues
  let mr=document.getElementById('_modal_root');
  if(!mr){mr=document.createElement('div');mr.id='_modal_root';document.body.appendChild(mr);}
  mr.innerHTML=modalHtml;
}

// ============ AUTH ============
onAuthStateChanged(auth, user=>{
  S.inicializando=false;
  if(user){
    S.user=user;S.error='';S.loading=false;
    if(!user.isAnonymous) cargarDatos(user.uid); // ignorar sesión anónima usada para validar código
  }
  else{S.user=null;S.movimientos=[];S.clientes=[];S.citas=[];S.inventario=[];S.comprobantes=[];S.salidas=[];S.entregas=[];S.cotizaciones=[];S.loading=false;render();}
});
render();

// ============ PWA SERVICE WORKER ============
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
